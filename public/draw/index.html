<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Collaborative Whiteboard Online – hrz.lol</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --bg:#faf8f3;--white:#fff;--ink:#111;--muted:#777770;--surface:#f3f0e8;--accent:#f0c040;--font:'Nunito',sans-serif; }
a { -webkit-tap-highlight-color: transparent; }
a:focus { outline: none; }
body { background:var(--bg);color:var(--ink);font-family:var(--font);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px; }
.card { background:var(--white);border:2.5px solid var(--ink);border-radius:24px;box-shadow:5px 6px 0 var(--ink);padding:40px;width:100%;max-width:420px; }
@media (max-width:480px) {
  body { padding:16px; align-items:flex-start; padding-top:48px; }
  .card { padding:28px 22px; border-radius:18px; box-shadow:3px 4px 0 var(--ink); }
}
h1 { font-size:32px;font-weight:900;letter-spacing:-0.04em;margin-bottom:8px; }
p { color:var(--muted);font-size:14px;font-weight:600;margin-bottom:28px;line-height:1.5; }
.btn { display:block;width:100%;padding:14px;background:var(--accent);border:2.5px solid var(--ink);border-radius:14px;font-family:var(--font);font-size:16px;font-weight:900;cursor:pointer;box-shadow:3px 4px 0 var(--ink);transition:transform .15s,box-shadow .15s; }
.btn:hover { transform:translateY(-2px);box-shadow:4px 6px 0 var(--ink); }
</style>
<meta property="og:image" content="https://hrz.lol/og/draw.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://hrz.lol/og/draw.png">
</head>
<body>
<div class="card">
  <h1>draw</h1>
  <p>create a room and draw with others in real time. canvas clears when everyone leaves.</p>
  <button class="btn" id="createBtn">create room</button>
</div>
<script>
document.getElementById('createBtn').onclick = async () => {
  const r = await fetch('/api/draw', { method: 'POST' });
  const { id } = await r.json();
  location.href = '/draw/' + id;
};
</script>
<script src="/footer.js?v=3" defer></script>
</body>
</html>
