</script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
a { -webkit-tap-highlight-color: transparent; color: inherit; text-decoration: none; }
button { font-family: inherit; -webkit-tap-highlight-color: transparent; }

:root {
  --bg:#faf8f3; --white:#fff; --ink:#111; --muted:#777770;
  --subtle:#c4c2ba; --surface:#f3f0e8; --accent:#f0c040; --font:'Nunito',sans-serif;
}

html, body { height: 100%; }
body {
  background: var(--bg); color: var(--ink); font-family: var(--font);
  display: flex; flex-direction: column;
  min-height: 100dvh; overflow-x: hidden;
}

.topbar {
  width: 100%; max-width: 860px; margin: 0 auto;
  padding: 24px 24px 0;
  display: flex; align-items: center; justify-content: space-between;
  position: relative; z-index: 5;
}
.logo { font-size: 22px; font-weight: 900; letter-spacing: -0.04em; color: var(--ink); }
.logo span { color: var(--muted); font-weight: 700; }
.back-btn {
  padding: 8px 14px; border: 2px solid var(--ink); border-radius: 999px;
  background: var(--white); font-weight: 800; font-size: 13px;
  box-shadow: 2px 3px 0 var(--ink); transition: transform .15s, box-shadow .15s;
  cursor: pointer; display: inline-flex; align-items: center; gap: 4px;
}
.back-btn:hover  { transform: translateY(-2px); box-shadow: 3px 5px 0 var(--ink); }
.back-btn:active { transform: scale(.97); box-shadow: 1px 2px 0 var(--ink); }

main {
  flex: 1; width: 100%; max-width: 520px; margin: 0 auto;
  padding: 36px 24px;
  position: relative; z-index: 1;
}

.view { animation: viewIn .35s ease both; }
@keyframes viewIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

.head { text-align: center; margin-bottom: 28px; }
.head h1 {
  font-size: clamp(32px, 6vw, 44px); font-weight: 900; letter-spacing: -0.04em;
  line-height: 1; margin-bottom: 12px;
}
.head p { font-size: 14px; font-weight: 600; color: var(--muted); line-height: 1.55; }

.coin-list { display: flex; flex-direction: column; gap: 14px; }

.coin-row {
  display: flex; align-items: center; gap: 16px;
  padding: 16px 18px;
  background: var(--white); border: 2.5px solid var(--ink); border-radius: 16px;
  box-shadow: 4px 5px 0 var(--ink);
  cursor: pointer;
  transition: transform .18s cubic-bezier(.34,1.56,.64,1), box-shadow .18s;
  opacity: 0; transform: translateY(14px);
  animation: rowIn .4s ease forwards;
}
.coin-row:nth-child(1) { animation-delay: .04s; }
.coin-row:nth-child(2) { animation-delay: .09s; }
.coin-row:nth-child(3) { animation-delay: .14s; }
.coin-row:nth-child(4) { animation-delay: .19s; }
.coin-row:nth-child(5) { animation-delay: .24s; }
@keyframes rowIn {
  to { opacity: 1; transform: translateY(0); }
}
.coin-row:hover  { transform: translateY(-3px); box-shadow: 5px 8px 0 var(--ink); }
.coin-row:active { transform: scale(.97); box-shadow: 2px 3px 0 var(--ink); }

.coin-icon { width: 44px; height: 44px; flex-shrink: 0; }
.coin-icon svg { display: block; width: 100%; height: 100%; }
.coin-text { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
.coin-name { font-size: 17px; font-weight: 900; letter-spacing: -0.02em; }
.coin-net  {
  font-size: 11px; font-weight: 800; letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--muted);
}
.coin-arrow {
  font-size: 18px; font-weight: 800; color: var(--muted); flex-shrink: 0;
  transition: transform .2s ease;
}
.coin-row:hover .coin-arrow { transform: translateX(4px); color: var(--ink); }

.detail {
  display: flex; flex-direction: column; align-items: center; gap: 22px;
}
.detail-head {
  animation: headIn .55s .35s cubic-bezier(.2,.85,.25,1) both;
}
.detail-card {
  animation: cardIn .6s .5s cubic-bezier(.2,.85,.25,1) both;
}
@keyframes headIn {
  from { opacity: 0; transform: translateY(-26px) scale(.88); filter: blur(6px); }
  to   { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
}
@keyframes cardIn {
  from { opacity: 0; transform: translateY(90px); }
  to   { opacity: 1; transform: translateY(0); }
}

.detail-head { display: flex; flex-direction: column; align-items: center; gap: 10px; text-align: center; }
.detail-icon { width: 80px; height: 80px; }
.detail-icon svg { display: block; width: 100%; height: 100%; }
.detail-name { font-size: 30px; font-weight: 900; letter-spacing: -0.03em; }
.detail-net {
  font-size: 11px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--muted);
}

.detail-card {
  width: 100%; max-width: 360px;
  display: flex; flex-direction: column; align-items: center; gap: 16px;
  padding: 20px;
  background: var(--white); border: 3px solid var(--ink); border-radius: 22px;
  box-shadow: 5px 6px 0 var(--ink);
}

.qr-wrap {
  width: 100%; aspect-ratio: 1;
  padding: 12px; background: #fff;
  border: 2.5px solid var(--ink); border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
}
.qr-wrap svg { display: block; width: 100%; height: 100%; }

.addr-block { width: 100%; display: flex; flex-direction: column; gap: 6px; }
.addr-label {
  font-size: 10px; font-weight: 900; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--muted);
}
.addr-value {
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  font-size: 12.5px; font-weight: 700;
  word-break: break-all; line-height: 1.45;
  padding: 10px 12px;
  background: var(--bg); border: 2px solid var(--ink); border-radius: 10px;
}
.copy-btn {
  width: 100%;
  padding: 13px 18px; border: 2.5px solid var(--ink); border-radius: 12px;
  background: var(--accent); font-size: 14px; font-weight: 900; cursor: pointer;
  box-shadow: 3px 4px 0 var(--ink);
  transition: transform .15s, box-shadow .15s, background .15s;
}
.copy-btn:hover  { transform: translateY(-2px); box-shadow: 4px 6px 0 var(--ink); }
.copy-btn:active { transform: scale(.97); box-shadow: 1px 2px 0 var(--ink); }
.copy-btn.copied { background: #d5f5e3; }

.flash {
  position: fixed; inset: 0;
  pointer-events: none;
  background: var(--flash-color, #f0c040);
  -webkit-clip-path: circle(0% at var(--fx, 50%) var(--fy, 50%));
          clip-path: circle(0% at var(--fx, 50%) var(--fy, 50%));
}
.flash.cover {
  z-index: 999;
  animation: flashCover .45s cubic-bezier(.55,0,.2,1) forwards;
}
.flash.reveal {
  z-index: 1000;
  animation: flashReveal .7s cubic-bezier(.55,0,.2,1) forwards;
}
@keyframes flashCover {
  to {
    -webkit-clip-path: circle(160% at var(--fx, 50%) var(--fy, 50%));
            clip-path: circle(160% at var(--fx, 50%) var(--fy, 50%));
  }
}
@keyframes flashReveal {
  to {
    -webkit-clip-path: circle(160% at var(--fx, 50%) var(--fy, 50%));
            clip-path: circle(160% at var(--fx, 50%) var(--fy, 50%));
  }
}

footer {
  padding: 24px; text-align: center;
  font-size: 12px; font-weight: 700; color: var(--subtle); line-height: 1.6;
  position: relative; z-index: 1;
}
footer a { text-decoration: underline; color: var(--muted); }

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; }
  .flash { display: none !important; }
}

@media (max-width: 600px) {
  main { padding: 24px 18px; }
  .coin-row { padding: 14px 16px; gap: 14px; }
  .coin-icon { width: 40px; height: 40px; }
  .coin-name { font-size: 16px; }
  .detail-icon { width: 68px; height: 68px; }
  .detail-name { font-size: 26px; }
  .addr-value { font-size: 11.5px; }
}
</style>
</head>
<body>

<div class="topbar">
  <a class="logo" href="//hrz.lol">hrz<span>.lol</span></a>
  <a class="back-btn" id="backBtn" href="/support">&larr; back</a>
</div>

<main>
  <div class="view" id="viewSelect">
    <div class="head">
      <h1>pay via crypto</h1>
      <p>pick a network &ndash; addresses go straight to my wallets. no middleman, 0% fees.</p>
    </div>
    <div class="coin-list" id="coinList"></div>
  </div>

  <div class="view" id="viewDetail" style="display: none;">
    <div class="detail">
      <div class="detail-head">
        <div id="detailIcon" class="detail-icon"></div>
        <div class="detail-name" id="detailName"></div>
        <div class="detail-net" id="detailNet"></div>
      </div>

      <div class="detail-card">
        <div class="qr-wrap" id="detailQr" aria-label="address QR code"></div>
        <div class="addr-block">
          <div class="addr-label">address</div>
          <div class="addr-value" id="detailAddr"></div>
        </div>
        <button class="copy-btn" id="copyBtn" type="button">copy address</button>
      </div>
    </div>
  </div>
</main>

<footer>
  open source &middot; <a href="https://www.gnu.org/licenses/agpl-3.0.html" target="_blank" rel="noopener">agpl-3.0</a>
</footer>

<script>
const ICONS = {
  BTC: `<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
    <circle cx="16" cy="16" r="16" fill="#F7931A"/>
    <path fill="#fff" d="M23.189 14.02c.314-2.096-1.283-3.223-3.465-3.975l.708-2.84-1.728-.43-.69 2.765c-.454-.114-.92-.22-1.385-.326l.695-2.783-1.728-.43-.708 2.839c-.376-.086-.746-.17-1.104-.26l.002-.009-2.384-.595-.46 1.846s1.283.294 1.256.312c.7.175.826.638.805 1.006l-.806 3.235c.048.012.11.03.18.057l-.183-.045-1.13 4.532c-.086.212-.303.531-.793.41.018.025-1.256-.313-1.256-.313l-.858 1.978 2.25.561c.418.105.828.215 1.231.318l-.715 2.872 1.727.43.708-2.84c.472.127.93.245 1.378.357l-.706 2.828 1.728.43.715-2.866c2.948.558 5.164.333 6.097-2.333.752-2.146-.037-3.385-1.588-4.192 1.13-.26 1.98-1.003 2.207-2.538zm-3.95 5.538c-.533 2.147-4.148.986-5.32.695l.95-3.805c1.172.293 4.929.872 4.37 3.11zm.535-5.569c-.487 1.953-3.495.96-4.47.717l.86-3.45c.975.243 4.118.696 3.61 2.733z"/>
  </svg>`,
  ETH: `<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
    <circle cx="16" cy="16" r="16" fill="#627EEA"/>
    <g fill="#fff" fill-rule="evenodd">
      <path fill-opacity=".602" d="M16.498 4v8.87l7.497 3.35z"/>
      <path d="M16.498 4L9 16.22l7.498-3.35z"/>
      <path fill-opacity=".602" d="M16.498 21.968v6.027L24 17.616z"/>
      <path d="M16.498 27.995v-6.028L9 17.616z"/>
      <path fill-opacity=".2" d="M16.498 20.573l7.497-4.353-7.497-3.348z"/>
      <path fill-opacity=".602" d="M9 16.22l7.498 4.353v-7.701z"/>
    </g>
  </svg>`,
  SOL: `<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="solBg" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#1a1a2e"/>
        <stop offset="100%" stop-color="#0f0f1e"/>
      </linearGradient>
      <linearGradient id="solBar" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#00FFA3"/>
        <stop offset="100%" stop-color="#DC1FFF"/>
      </linearGradient>
    </defs>
    <circle cx="16" cy="16" r="16" fill="url(#solBg)"/>
    <path fill="url(#solBar)" d="M9.92 20.79a.55.55 0 0 1 .39-.16h13.39c.34 0 .51.4.27.65l-2.65 2.64a.55.55 0 0 1-.4.16H7.55c-.34 0-.51-.4-.27-.64l2.64-2.65zm0-9.87a.57.57 0 0 1 .39-.16h13.39c.34 0 .51.4.27.65l-2.65 2.64a.55.55 0 0 1-.4.16H7.55c-.34 0-.51-.4-.27-.64l2.64-2.65zm11.27 4.9a.55.55 0 0 0-.4-.16H7.4c-.34 0-.51.4-.27.65l2.64 2.64c.1.1.25.16.4.16h13.39c.34 0 .5-.4.26-.65l-2.64-2.64z"/>
  </svg>`,
  TON: `<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
    <circle cx="16" cy="16" r="16" fill="#0098EA"/>
    <path fill="#fff" d="M11.06 9.5h9.88c1.83 0 2.99 1.97 2.07 3.56L17.04 23.4a1.2 1.2 0 0 1-2.08 0L8.99 13.06c-.92-1.59.24-3.56 2.07-3.56zm4.21 1.74h-4.21c-.4 0-.65.43-.45.78l4.66 8.05v-8.83zm5.65.78c.2-.34-.05-.78-.45-.78h-4.21v8.83l4.66-8.05z"/>
  </svg>`,
  TRX: `<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
    <circle cx="16" cy="16" r="16" fill="#EF0027"/>
    <path fill="#fff" d="M21.93 9.41a16.43 16.43 0 0 0-2.45-1.86A92.7 92.7 0 0 0 7 5l11.43 21L24 10.5c-.34-.28-1.32-.81-2.07-1.09zm-.32 1.25c-.43.4-1.04.94-1.5 1.31l-3-2.49 5.61.84-1.11.34zM12.96 11.95l5.59 4.65-.62 5.17-5.7-9.4.73-.42zm7.2 4.34l-.5 4.4-.66-3.34-2.62-2.18 3.78 1.12zm-.65-5.9l-6.4-1.05 5.39-1.65-.66 2.71.92.27.75-2.97c.43.2 1.55.78 2.16 1.21-.3.27-1.39 1.07-2.16 1.48z"/>
  </svg>`,
};

const COIN_COLORS = {
  BTC: '#F7931A',
  ETH: '#627EEA',
  SOL: '#9945FF',
  TON: '#0098EA',
  TRX: '#EF0027',
};

const COINS = [
  { sym: 'BTC', name: 'Bitcoin',          net: 'bitcoin',         addr: 'bc1q6pq0zk345u5sexu5e9kdsxz573kyu7pg97553t' },
  { sym: 'ETH', name: 'Ethereum',         net: 'ethereum',        addr: '0x1F76f1f2De349875F257519DC991841F63739986' },
  { sym: 'SOL', name: 'Solana',           net: 'solana',          addr: 'He1xd1t89mrVMdJeMtWgXZVgYM8zhHMhenVC7RjrW8cd' },
  { sym: 'TON', name: 'Toncoin',          net: 'the open network',addr: 'UQDu3eTlMcNkCwbWCG7xu_VYFpvACu_TzHH0Du-wFJDOH7oc' },
  { sym: 'TRX', name: 'Tron',             net: 'tron',            addr: 'TLPKnQeAUFsFL8hmGivW95Byw1KRxj8gQW' },
];

function makeQrSvg(text) {
  const qr = qrcode(0, 'M');
  qr.addData(text);
  qr.make();
  return qr.createSvgTag({ scalable: true, cellSize: 4, margin: 2 });
}

const viewSelect = document.getElementById('viewSelect');
const viewDetail = document.getElementById('viewDetail');
const detailIcon = document.getElementById('detailIcon');
const detailName = document.getElementById('detailName');
const detailNet  = document.getElementById('detailNet');
const detailQr   = document.getElementById('detailQr');
const detailAddr = document.getElementById('detailAddr');
const copyBtn    = document.getElementById('copyBtn');
const backBtn    = document.getElementById('backBtn');
const list       = document.getElementById('coinList');

COINS.forEach((c) => {
  const row = document.createElement('a');
  row.className = 'coin-row';
  row.href = `#${c.sym.toLowerCase()}`;
  row.innerHTML = `
    <div class="coin-icon">${ICONS[c.sym]}</div>
    <div class="coin-text">
      <div class="coin-name">${c.name}</div>
      <div class="coin-net">${c.sym} &middot; ${c.net}</div>
    </div>
    <div class="coin-arrow">&rarr;</div>
  `;
  row.addEventListener('click', (e) => {
    e.preventDefault();
    const rect = row.getBoundingClientRect();
    runTransition(COIN_COLORS[c.sym], rect, () => {
      location.hash = c.sym.toLowerCase();
    });
  });
  list.appendChild(row);
});

function runTransition(color, originRect, swap) {
  const cover = document.createElement('div');
  cover.className = 'flash cover';
  cover.style.setProperty('--flash-color', color);
  if (originRect) {
    cover.style.setProperty('--fx', `${originRect.left + originRect.width / 2}px`);
    cover.style.setProperty('--fy', `${originRect.top  + originRect.height / 2}px`);
  } else {
    cover.style.setProperty('--fx', '50%');
    cover.style.setProperty('--fy', '50%');
  }
  document.body.appendChild(cover);

  setTimeout(() => {
    swap();
    const reveal = document.createElement('div');
    reveal.className = 'flash reveal';
    reveal.style.setProperty('--flash-color', '#faf8f3');
    reveal.style.setProperty('--fx', '50%');
    reveal.style.setProperty('--fy', '50%');
    document.body.appendChild(reveal);

    setTimeout(() => {
      cover.remove();
      reveal.remove();
    }, 780);
  }, 450);
}

function showSelect() {
  viewDetail.style.display = 'none';
  viewSelect.style.display = 'block';
  viewSelect.style.animation = 'none';
  viewSelect.offsetHeight;
  viewSelect.style.animation = '';
  document.title = 'pay via crypto – hrz.lol';
  backBtn.setAttribute('href', '/support');
  backBtn.onclick = null;
  window.scrollTo(0, 0);
}

function showDetail(coin) {
  detailIcon.innerHTML = ICONS[coin.sym];
  detailName.textContent = coin.name;
  detailNet.textContent  = `${coin.sym} · ${coin.net}`;
  detailQr.innerHTML     = makeQrSvg(coin.addr);
  detailAddr.textContent = coin.addr;
  copyBtn.textContent    = 'copy address';
  copyBtn.classList.remove('copied');

  copyBtn.onclick = async () => {
    try { await navigator.clipboard.writeText(coin.addr); }
    catch {
      const ta = document.createElement('textarea');
      ta.value = coin.addr; document.body.appendChild(ta); ta.select();
      document.execCommand('copy'); document.body.removeChild(ta);
    }
    copyBtn.textContent = 'copied!';
    copyBtn.classList.add('copied');
    setTimeout(() => {
      copyBtn.textContent = 'copy address';
      copyBtn.classList.remove('copied');
    }, 1800);
  };

  viewSelect.style.display = 'none';
  viewDetail.style.display = 'block';
  viewDetail.querySelectorAll('.detail-head, .detail-card').forEach(el => {
    el.style.animation = 'none';
    void el.offsetHeight;
    el.style.animation = '';
  });
  document.title = `pay via ${coin.name} – hrz.lol`;

  backBtn.setAttribute('href', '#');
  backBtn.onclick = (e) => {
    e.preventDefault();
    const rect = backBtn.getBoundingClientRect();
    runTransition('#faf8f3', rect, () => { location.hash = ''; });
  };

  window.scrollTo(0, 0);
}

function syncFromHash() {
  const sym = (location.hash || '').replace('#', '').toUpperCase();
  const coin = COINS.find(c => c.sym === sym);
  if (coin) showDetail(coin);
  else showSelect();
}

window.addEventListener('hashchange', syncFromHash);
syncFromHash();
</script>
<script src="/footer.js?v=3" defer></script>
</body>
