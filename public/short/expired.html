<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>link expired – hrz.lol</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #faf8f3; font-family: 'Nunito', sans-serif;
  display: flex; align-items: center; justify-content: center; min-height: 100vh;
}
.card {
  text-align: center; background: #fff; border: 2.5px solid #111;
  border-radius: 24px; box-shadow: 5px 6px 0 #111; padding: 48px 40px; max-width: 380px;
}
.num { font-size: 72px; font-weight: 900; letter-spacing: -0.05em; line-height: 1; margin-bottom: 12px; }
h1  { font-size: 22px; font-weight: 900; letter-spacing: -0.03em; margin-bottom: 8px; }
p   { color: #777770; font-size: 14px; font-weight: 600; margin-bottom: 28px; line-height: 1.5; }
a   {
  display: inline-block; padding: 12px 28px; background: #f0c040;
  border: 2.5px solid #111; border-radius: 14px; font-weight: 900; font-size: 15px;
  text-decoration: none; color: #111; box-shadow: 3px 3px 0 #111;
  transition: transform .15s, box-shadow .15s;
}
a:hover { transform: translateY(-2px); box-shadow: 4px 5px 0 #111; }
</style>
</head>
<body>
<div class="card">
  <div class="num">410</div>
  <h1>link expired</h1>
  <p>this link has reached its click limit and has been removed.</p>
  <a href="/short">shorten a new link</a>
</div>
</body>
</html>
