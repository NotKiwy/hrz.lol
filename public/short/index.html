<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free URL Shortener – hrz.lol</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
a { -webkit-tap-highlight-color: transparent; }
a:focus { outline: none; }
a:focus-visible { outline: 2px solid var(--ink); outline-offset: 3px; }

:root {
  --bg:      #faf8f3;
  --white:   #ffffff;
  --ink:     #111111;
  --muted:   #777770;
  --subtle:  #c4c2ba;
  --surface: #f3f0e8;
  --accent:  #f0c040;
  --radius:  18px;
  --border:  2.5px solid #111111;
  --font:    'Nunito', sans-serif;
}

html, body { height: 100%; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font);
  font-size: 15px;
  line-height: 1.5;
  overflow-x: hidden;
}

.page {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 20px 48px;
}

header {
  width: 100%;
  max-width: 560px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 28px 0 32px;
  animation: fadeUp .4s ease both;
}

.logo {
  font-size: 22px;
  font-weight: 900;
  letter-spacing: -0.04em;
  text-decoration: none;
  color: var(--ink);
}
.logo span { color: var(--muted); font-weight: 700; }

.nav-link {
  font-size: 12px;
  font-weight: 800;
  color: var(--muted);
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  padding: 4px 12px;
  border: 2px solid var(--subtle);
  border-radius: 999px;
  transition: border-color .15s, color .15s;
}
.nav-link:hover { border-color: var(--ink); color: var(--ink); }

.card {
  width: 100%;
  max-width: 560px;
  background: var(--white);
  border: var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  animation: fadeUp .4s .06s ease both;
  box-shadow: 4px 6px 0 #111111;
}

.card-body { padding: 32px 32px 28px; }

.card-title {
  font-size: 26px;
  font-weight: 900;
  letter-spacing: -0.04em;
  margin-bottom: 4px;
}
.card-sub {
  font-size: 13px;
  font-weight: 600;
  color: var(--muted);
  margin-bottom: 28px;
}

.max-clicks-row {
  display: flex; align-items: center; gap: 10px; margin-bottom: 20px;
  font-size: 13px; font-weight: 700; color: var(--muted);
}
.max-clicks-toggle {
  display: flex; align-items: center; gap: 8px; cursor: pointer;
}
.max-clicks-toggle input { display: none; }
.checkbox-ui {
  width: 18px; height: 18px; border: 2px solid var(--ink); border-radius: 5px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  font-size: 11px; font-weight: 900; transition: background .1s;
}
.max-clicks-toggle input:checked ~ .checkbox-ui { background: var(--accent); }
.max-clicks-toggle input:checked ~ .checkbox-ui::after {
  content: ''; display: block; width: 5px; height: 9px; margin: 1px auto 0;
  border: solid var(--ink); border-width: 0 2px 2px 0; transform: rotate(45deg);
}
.max-clicks-input-wrap { display: flex; align-items: center; gap: 6px; }
.small-input {
  width: 64px; padding: 5px 10px; border: 2px solid var(--ink); border-radius: 8px;
  font-family: var(--font); font-size: 14px; font-weight: 800; background: var(--bg);
  outline: none; text-align: center;
}

.input-row {
  display: flex;
  gap: 0;
  border: 2px solid var(--subtle);
  border-radius: 14px;
  overflow: hidden;
  transition: border-color .2s, box-shadow .2s;
  background: var(--bg);
  margin-bottom: 20px;
}
.input-row:focus-within {
  border-color: var(--ink);
  box-shadow: 3px 3px 0 var(--ink);
  background: var(--white);
}

input#url {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--ink);
  font-family: var(--font);
  font-size: 14px;
  font-weight: 600;
  padding: 13px 16px;
}
input#url::placeholder { color: var(--subtle); font-weight: 600; }

.btn-shorten {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 0 20px;
  background: var(--accent);
  color: var(--ink);
  border: none;
  border-left: 2px solid var(--ink);
  font-family: var(--font);
  font-size: 13px;
  font-weight: 900;
  cursor: pointer;
  transition: opacity .15s;
  white-space: nowrap;
  letter-spacing: -0.01em;
}
.btn-shorten:hover   { opacity: .85; }
.btn-shorten:active  { opacity: .7;  }
.btn-shorten:disabled { opacity: .4; cursor: not-allowed; }

.result {
  display: none;
  flex-direction: column;
  gap: 0;
  border: 2px solid var(--ink);
  border-radius: 14px;
  overflow: hidden;
  animation: fadeUp .3s ease both;
}
.result.show { display: flex; }

.result-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px;
  background: var(--surface);
  gap: 12px;
}

.result-link {
  font-size: 18px;
  font-weight: 900;
  letter-spacing: -0.03em;
  color: var(--ink);
  text-decoration: none;
  word-break: break-all;
}
.result-link:hover { text-decoration: underline; }

.btn-copy {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  background: var(--white);
  color: var(--ink);
  border: 2px solid var(--ink);
  border-radius: 999px;
  font-family: var(--font);
  font-size: 12px;
  font-weight: 900;
  cursor: pointer;
  transition: transform .18s cubic-bezier(.34,1.56,.64,1), box-shadow .18s;
  box-shadow: 2px 2px 0 var(--ink);
  flex-shrink: 0;
}
.btn-copy:hover   { transform: translateY(-2px); box-shadow: 3px 4px 0 var(--ink); }
.btn-copy:active  { transform: scale(.97); }
.btn-copy.success { background: #e8f5e9; border-color: #4caf50; color: #2e7d32; box-shadow: 2px 2px 0 #4caf50; }

.result-original {
  padding: 10px 18px;
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  border-top: 2px solid #eeebe2;
  background: var(--white);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.error-bar {
  display: none;
  align-items: center;
  gap: 10px;
  padding: 11px 16px;
  background: #fff0f0;
  border: 2px solid #e87070;
  border-radius: 12px;
  font-size: 13px;
  font-weight: 700;
  color: #c03030;
  margin-bottom: 16px;
}
.error-bar.show { display: flex; }

.history-wrap { margin-top: 24px; }
.history-label {
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
}

.history-list { display: flex; flex-direction: column; gap: 8px; }

.history-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  background: var(--surface);
  border: 2px solid #e0ddd4;
  border-radius: 12px;
  gap: 12px;
  animation: fadeUp .3s ease both;
}
.history-item:hover { border-color: var(--ink); }

.history-short {
  font-size: 13px;
  font-weight: 900;
  letter-spacing: -0.02em;
  text-decoration: none;
  color: var(--ink);
}
.history-short:hover { text-decoration: underline; }

.history-orig {
  flex: 1;
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  min-width: 0;
}

.history-copy {
  display: inline-flex;
  align-items: center;
  padding: 4px 10px;
  border: 2px solid var(--subtle);
  border-radius: 999px;
  font-family: var(--font);
  font-size: 11px;
  font-weight: 800;
  color: var(--muted);
  cursor: pointer;
  background: transparent;
  transition: border-color .15s, color .15s;
  flex-shrink: 0;
}
.history-copy:hover  { border-color: var(--ink); color: var(--ink); }
.history-copy.copied { border-color: #4caf50; color: #2e7d32; }

.card-footer {
  padding: 14px 32px 18px;
  border-top: 2px solid #eeebe2;
  background: var(--bg);
  font-size: 12px;
  font-weight: 600;
  color: var(--subtle);
}

.spinner {
  display: inline-block;
  width: 13px; height: 13px;
  border: 2.5px solid rgba(0,0,0,.2);
  border-top-color: var(--ink);
  border-radius: 50%;
  animation: spin .6s linear infinite;
  flex-shrink: 0;
}
@keyframes spin   { to { transform: rotate(360deg); } }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0);    }
}

@media (max-width: 600px) {
  .page { padding: 0 14px 36px; }
  header { padding: 18px 0 20px; }
  .card-body { padding: 22px 18px 18px; }
  .card-title { font-size: 22px; }
  .card-footer { padding: 12px 18px 16px; }
  .btn-shorten { padding: 0 14px; font-size: 12px; }
  .result-top { flex-wrap: wrap; gap: 8px; }
  .result-link { font-size: 15px; }
  .history-item { flex-wrap: wrap; gap: 6px; }
  .history-orig { min-width: 0; width: 100%; order: 3; }
}
</style>
<meta name="description" content="Shorten any URL for free with no account required. Fast redirects, links never expire.">

<meta property="og:title" content="Free URL Shortener – hrz.lol">
<meta property="og:description" content="Shorten any URL for free with no account required. Fast redirects, links never expire.">
<meta name="twitter:title" content="Free URL Shortener – hrz.lol">
<meta name="twitter:description" content="Shorten any URL for free with no account required. Fast redirects, links never expire.">
<meta property="og:image" content="https://hrz.lol/og/lnk.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://hrz.lol/og/lnk.png">
</head>
<body>
<div class="page">
  <header>
    <a class="logo" href="//hrz.lol">hrz<span>.lol</span></a>
    <a class="nav-link" href="/">paste</a>
  </header>

  <div class="card">
    <div class="card-body">
      <div class="card-title">shorten a link</div>
      <div class="card-sub">paste any url – get a short one</div>

      <div id="errorBar" class="error-bar">
        <span id="errorMsg"></span>
      </div>

      <div class="input-row">
        <input
          type="text"
          id="url"
          placeholder="https://example.com/very/long/url"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
        >
        <button class="btn-shorten" id="shortenBtn" onclick="shorten()">
          <span id="btnContent">shorten</span>
        </button>
      </div>

      <div class="max-clicks-row">
        <label class="max-clicks-toggle">
          <input type="checkbox" id="limitToggle">
          <div class="checkbox-ui"></div>
          <span>expire after</span>
        </label>
        <div class="max-clicks-input-wrap" id="maxClicksWrap" style="display:none">
          <input type="number" id="maxClicks" value="5" min="1" max="10000" class="small-input">
          <span>clicks</span>
        </div>
      </div>

      <div class="result" id="result">
        <div class="result-top">
          <a class="result-link" id="resultLink" target="_blank" rel="noopener"></a>
          <button class="btn-copy" id="copyBtn" onclick="copyResult()">copy</button>
        </div>
      </div>

      <div id="historyWrap" class="history-wrap" style="display:none">
        <div class="history-label">recent</div>
        <div class="history-list" id="historyList"></div>
      </div>
    </div>

    <div class="card-footer">
      clicks are counted &nbsp;·&nbsp; optionally set a click limit
    </div>
  </div>
</div>

<script>
const urlInput   = document.getElementById('url');
const shortenBtn = document.getElementById('submitBtn') || document.getElementById('shortenBtn');
const btnContent = document.getElementById('btnContent');
const errorBar   = document.getElementById('errorBar');
const errorMsg   = document.getElementById('errorMsg');
const result     = document.getElementById('result');
const resultLink = document.getElementById('resultLink');
const resultOrig = document.getElementById('resultOriginal');

const HISTORY_KEY = 'hrz_short_history';

function getHistory() {
  try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); } catch { return []; }
}

function saveToHistory(item) {
  const h = getHistory().filter(x => x.code !== item.code);
  h.unshift(item);
  localStorage.setItem(HISTORY_KEY, JSON.stringify(h.slice(0, 10)));
}

function renderHistory() {
  const h = getHistory();
  const wrap = document.getElementById('historyWrap');
  const list = document.getElementById('historyList');
  if (!h.length) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';
  list.innerHTML = h.map(item => `
    <div class="history-item">
      <a class="history-short" href="${item.short}" target="_blank">${item.short.replace(/^https?:\/\//, '')}</a>
      <span class="history-orig">${item.url}</span>
      <button class="history-copy" onclick="copyText('${item.short}', this)">copy</button>
    </div>
  `).join('');
}

function showError(msg) {
  errorMsg.textContent = msg;
  errorBar.classList.add('show');
}

function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent;
    btn.textContent = 'copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 2000);
  });
}

function copyResult() {
  const url = resultLink.href;
  copyText(url, document.getElementById('copyBtn'));
}

async function shorten() {
  const url = urlInput.value.trim();
  if (!url) { showError('please enter a url'); urlInput.focus(); return; }

  errorBar.classList.remove('show');
  result.classList.remove('show');
  shortenBtn.disabled = true;
  btnContent.innerHTML = '<span class="spinner"></span>';

  try {
    const limitOn  = document.getElementById('limitToggle').checked;
    const maxClicks = limitOn ? parseInt(document.getElementById('maxClicks').value) || 5 : null;

    const res  = await fetch('/api/short', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url, max_clicks: maxClicks }),
    });
    const data = await res.json();
    if (!res.ok) { showError(data.error || 'server error'); return; }

    resultLink.textContent = data.short.replace(/^https?:\/\//, '');
    resultLink.href        = data.short;
    result.classList.add('show');

    const origEl = document.getElementById('resultOriginal');
    if (origEl) origEl.textContent = '→ ' + url;

    if (data.max_clicks) {
      let badge = document.getElementById('maxClicksBadge');
      if (!badge) {
        badge = document.createElement('div');
        badge.id = 'maxClicksBadge';
        badge.style.cssText = 'padding:8px 18px;font-size:12px;font-weight:700;color:var(--muted);border-top:2px solid #eeebe2;background:var(--white)';
        result.appendChild(badge);
      }
      badge.textContent = `expires after ${data.max_clicks} click${data.max_clicks === 1 ? '' : 's'}`;
    }

    saveToHistory({ code: data.code, short: data.short, url, max_clicks: data.max_clicks });
    renderHistory();
    urlInput.value = '';
  } catch {
    showError('network error – try again');
  } finally {
    shortenBtn.disabled = false;
    btnContent.textContent = 'shorten';
  }
}

urlInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') shorten();
});

document.getElementById('limitToggle').addEventListener('change', function() {
  document.getElementById('maxClicksWrap').style.display = this.checked ? 'flex' : 'none';
});

renderHistory();
</script>
<script src="/footer.js?v=3" defer></script>
</body>
