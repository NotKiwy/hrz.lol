<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subnet Calculator – IPv4 CIDR – hrz.lol</title>
<meta name="description" content="IPv4 CIDR subnet calculator. Network, broadcast, range, mask, host count.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;600;700;800;900&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
a{-webkit-tap-highlight-color:transparent;color:inherit;text-decoration:none}
button{font-family:inherit;-webkit-tap-highlight-color:transparent}
:root{--bg:#faf8f3;--white:#fff;--ink:#111;--muted:#777770;--subtle:#c4c2ba;--surface:#f3f0e8;--accent:#f0c040;--font:'Nunito',sans-serif;--mono:'JetBrains Mono',monospace}
html,body{height:100%}
body{background:var(--bg);color:var(--ink);font-family:var(--font);overflow-x:hidden}
.page{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:0 20px 48px}
header{width:100%;max-width:760px;display:flex;align-items:center;justify-content:space-between;padding:24px 0 28px;animation:fadeUp .4s ease both}
.logo{font-size:22px;font-weight:900;letter-spacing:-0.04em;color:var(--ink)}
.logo span{color:var(--muted)}
.nav-link{font-size:12px;font-weight:800;color:var(--muted);padding:4px 12px;border:2px solid var(--subtle);border-radius:999px;transition:border-color .15s,color .15s}
.nav-link:hover{border-color:var(--ink);color:var(--ink)}
.wrap{width:100%;max-width:760px;display:flex;flex-direction:column;gap:18px;animation:fadeUp .4s .06s ease both}
.input-card{background:var(--white);border:2.5px solid var(--ink);border-radius:18px;box-shadow:3px 4px 0 var(--ink);overflow:hidden}
.input-head{display:flex;align-items:center;justify-content:space-between;padding:10px 18px;background:var(--surface);border-bottom:2px solid var(--ink)}
.label{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.07em;color:var(--muted)}
.input-body{padding:18px;display:flex;gap:10px;align-items:center}
.cidr-input{flex:1;padding:14px 16px;font-family:var(--mono);font-size:18px;font-weight:700;border:2.5px solid var(--ink);border-radius:12px;background:var(--white);color:var(--ink);outline:none}
.cidr-input:focus{box-shadow:0 0 0 3px rgba(240,192,64,.4)}
.cidr-input.err{border-color:#d24747}
.preset{font-size:11px;font-weight:700;color:var(--muted);padding:8px 12px;border:2px solid var(--subtle);border-radius:8px;cursor:pointer;background:transparent;font-family:var(--mono)}
.preset:hover{border-color:var(--ink);color:var(--ink)}
.result-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.cell{background:var(--white);border:2.5px solid var(--ink);border-radius:14px;padding:14px 18px;box-shadow:2px 3px 0 var(--ink)}
.cell-label{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:4px}
.cell-val{font-family:var(--mono);font-size:17px;font-weight:700;letter-spacing:-.01em;word-break:break-all}
.cell-val.small{font-size:14px}
.cell.wide{grid-column:1/-1}
.bin-card{background:var(--white);border:2.5px solid var(--ink);border-radius:18px;box-shadow:3px 4px 0 var(--ink);overflow:hidden}
.bin-head{display:flex;align-items:center;justify-content:space-between;padding:10px 18px;background:var(--surface);border-bottom:2px solid var(--ink)}
.bin-body{padding:16px 18px;font-family:var(--mono);font-size:13px;line-height:1.9}
.bin-row{display:flex;gap:18px;flex-wrap:wrap}
.bin-row .k{color:var(--muted);min-width:100px}
.bin-row .v{font-weight:700;letter-spacing:.5px}
.bin-row .net{background:var(--accent);padding:0 2px;border-radius:2px}
.preset-row{display:flex;flex-wrap:wrap;gap:6px;padding:0 18px 16px}
.err-msg{padding:14px 18px;background:#fbe7e7;color:#a13030;font-weight:700;border-radius:12px;display:none}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:560px){.result-grid{grid-template-columns:1fr}.cell-val{font-size:15px}}
</style>
</head>
<body>
<div class="page">
  <header>
    <a class="logo" href="//hrz.lol">hrz<span>.lol</span></a>
    <a class="nav-link" href="//hrz.lol">all tools</a>
  </header>

  <div class="wrap">
    <div class="input-card">
      <div class="input-head">
        <div class="label">CIDR notation</div>
        <div class="label" id="cidrInfo">/24 = 256 IPs</div>
      </div>
      <div class="input-body">
        <input class="cidr-input" id="cidrIn" value="192.168.1.0/24" placeholder="10.0.0.0/16" spellcheck="false" autocomplete="off">
      </div>
      <div class="preset-row">
        <button class="preset" data-c="192.168.0.0/24">192.168.0.0/24</button>
        <button class="preset" data-c="10.0.0.0/8">10.0.0.0/8</button>
        <button class="preset" data-c="172.16.0.0/12">172.16.0.0/12</button>
        <button class="preset" data-c="100.64.0.0/10">100.64.0.0/10</button>
        <button class="preset" data-c="192.168.1.0/26">/26</button>
        <button class="preset" data-c="192.168.1.0/30">/30</button>
      </div>
    </div>

    <div class="err-msg" id="err"></div>

    <div class="result-grid" id="results"></div>

    <div class="bin-card">
      <div class="bin-head"><div class="label">Binary view</div></div>
      <div class="bin-body" id="binBody"></div>
    </div>
  </div>
</div>

<script>
const cidrIn = document.getElementById('cidrIn');
const err = document.getElementById('err');
const results = document.getElementById('results');
const binBody = document.getElementById('binBody');
const cidrInfo = document.getElementById('cidrInfo');

document.querySelectorAll('.preset').forEach(b => {
  b.addEventListener('click', () => { cidrIn.value = b.dataset.c; calc(); });
});

cidrIn.addEventListener('input', calc);

function parseIp(s) {
  const p = s.split('.');
  if (p.length !== 4) return null;
  const n = p.map(x => parseInt(x, 10));
  if (n.some(x => isNaN(x) || x < 0 || x > 255)) return null;
  return (n[0] << 24 >>> 0) + (n[1] << 16) + (n[2] << 8) + n[3];
}

function ipStr(n) {
  return [(n >>> 24) & 255, (n >>> 16) & 255, (n >>> 8) & 255, n & 255].join('.');
}

function bin(n) {
  return [(n >>> 24) & 255, (n >>> 16) & 255, (n >>> 8) & 255, n & 255]
    .map(x => x.toString(2).padStart(8, '0')).join('.');
}

function calc() {
  const s = cidrIn.value.trim();
  const m = s.match(/^([\d.]+)(?:\/(\d+))?$/);
  if (!m) { showErr('format: 192.168.1.0/24'); return; }
  const ip = parseIp(m[1]);
  const mask = m[2] === undefined ? 32 : parseInt(m[2], 10);
  if (ip === null) { showErr('invalid IP'); return; }
  if (mask < 0 || mask > 32) { showErr('mask 0–32'); return; }

  cidrIn.classList.remove('err');
  err.style.display = 'none';

  const maskNum = mask === 0 ? 0 : (0xFFFFFFFF << (32 - mask)) >>> 0;
  const network = (ip & maskNum) >>> 0;
  const broadcast = (network | (~maskNum >>> 0)) >>> 0;
  const total = mask === 32 ? 1 : (mask === 31 ? 2 : (broadcast - network + 1));
  const usable = mask >= 31 ? total : total - 2;
  const firstHost = mask >= 31 ? network : network + 1;
  const lastHost = mask >= 31 ? broadcast : broadcast - 1;
  const wildcard = (~maskNum) >>> 0;

  let cls = 'unknown';
  const first = (ip >>> 24) & 0xFF;
  if (first < 128) cls = 'A';
  else if (first < 192) cls = 'B';
  else if (first < 224) cls = 'C';
  else if (first < 240) cls = 'D';
  else cls = 'E';

  const isPrivate =
    first === 10 ||
    (first === 172 && ((ip >>> 16) & 0xFF) >= 16 && ((ip >>> 16) & 0xFF) <= 31) ||
    (first === 192 && ((ip >>> 16) & 0xFF) === 168);

  cidrInfo.textContent = `/${mask} · ${total.toLocaleString()} IPs`;

  results.innerHTML = '';
  const cells = [
    { l: 'network', v: ipStr(network) },
    { l: 'broadcast', v: ipStr(broadcast) },
    { l: 'first host', v: ipStr(firstHost) },
    { l: 'last host', v: ipStr(lastHost) },
    { l: 'subnet mask', v: ipStr(maskNum) },
    { l: 'wildcard', v: ipStr(wildcard) },
    { l: 'total addresses', v: total.toLocaleString() },
    { l: 'usable hosts', v: usable.toLocaleString() },
    { l: 'class', v: cls + (isPrivate ? ' · private' : ' · public') },
    { l: 'range', v: `${ipStr(network)} → ${ipStr(broadcast)}`, small: true, wide: true },
  ];
  for (const c of cells) {
    const el = document.createElement('div');
    el.className = 'cell' + (c.wide ? ' wide' : '');
    el.innerHTML = `<div class="cell-label"></div><div class="cell-val${c.small ? ' small' : ''}"></div>`;
    el.querySelector('.cell-label').textContent = c.l;
    el.querySelector('.cell-val').textContent = c.v;
    results.appendChild(el);
  }

  binBody.innerHTML = '';
  const ipBin = bin(ip);
  const netBin = bin(network);
  const maskBin = bin(maskNum);
  const networkBits = mask;
  const ipBinHighlighted = highlightBits(ipBin, networkBits);
  binBody.innerHTML = `
    <div class="bin-row"><span class="k">input IP</span><span class="v">${ipBinHighlighted}</span></div>
    <div class="bin-row"><span class="k">network</span><span class="v">${netBin}</span></div>
    <div class="bin-row"><span class="k">mask</span><span class="v">${maskBin}</span></div>
  `;
}

function highlightBits(binStr, n) {
  let out = '', bits = 0;
  for (const ch of binStr) {
    if (ch === '.') { out += ch; continue; }
    if (bits < n) out += `<span class="net">${ch}</span>`;
    else out += ch;
    bits++;
  }
  return out;
}

function showErr(msg) {
  cidrIn.classList.add('err');
  err.textContent = msg;
  err.style.display = 'block';
  results.innerHTML = '';
  binBody.innerHTML = '';
  cidrInfo.textContent = '';
}

calc();
</script>
<script src="/footer.js?v=3" defer></script>
</body>
</html>
