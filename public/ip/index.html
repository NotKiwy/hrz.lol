<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>What's My IP – hrz.lol</title>
<meta name="description" content="See your public IP, country, reverse DNS, user-agent and other headers.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;600;700;800;900&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
a{-webkit-tap-highlight-color:transparent;color:inherit;text-decoration:none}
button{font-family:inherit;-webkit-tap-highlight-color:transparent}
:root{--bg:#faf8f3;--white:#fff;--ink:#111;--muted:#777770;--subtle:#c4c2ba;--surface:#f3f0e8;--accent:#f0c040;--font:'Nunito',sans-serif;--mono:'JetBrains Mono',monospace}
html,body{height:100%}
body{background:var(--bg);color:var(--ink);font-family:var(--font);overflow-x:hidden}
.page{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:0 20px 48px}
header{width:100%;max-width:760px;display:flex;align-items:center;justify-content:space-between;padding:24px 0 28px;animation:fadeUp .4s ease both}
.logo{font-size:22px;font-weight:900;letter-spacing:-0.04em;color:var(--ink)}
.logo span{color:var(--muted)}
.nav-link{font-size:12px;font-weight:800;color:var(--muted);padding:4px 12px;border:2px solid var(--subtle);border-radius:999px;transition:border-color .15s,color .15s}
.nav-link:hover{border-color:var(--ink);color:var(--ink)}
.wrap{width:100%;max-width:760px;display:flex;flex-direction:column;gap:18px;animation:fadeUp .4s .06s ease both}
.hero{background:var(--white);border:2.5px solid var(--ink);border-radius:18px;padding:36px 28px;box-shadow:3px 4px 0 var(--ink);text-align:center}
.hero-label{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:10px}
.hero-ip{font-family:var(--mono);font-size:clamp(28px,7vw,52px);font-weight:800;letter-spacing:-.02em;word-break:break-all;line-height:1.1}
.hero-actions{display:flex;justify-content:center;gap:10px;margin-top:18px}
.hero-pill{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;background:var(--surface);border:2px solid var(--subtle);border-radius:999px;font-size:12px;font-weight:800;color:var(--muted)}
.copy{padding:7px 16px;border:2px solid var(--ink);border-radius:8px;background:var(--accent);font-size:12px;font-weight:800;cursor:pointer;color:var(--ink);box-shadow:2px 3px 0 var(--ink);transition:transform .12s,box-shadow .12s}
.copy:hover{transform:translateY(-1px);box-shadow:3px 4px 0 var(--ink)}
.copy:active{transform:scale(.97);box-shadow:1px 2px 0 var(--ink)}
.copy.ok{background:#2bbf6a;color:var(--white)}
.card{background:var(--white);border:2.5px solid var(--ink);border-radius:18px;box-shadow:3px 4px 0 var(--ink);overflow:hidden}
.card-head{padding:10px 18px;background:var(--surface);border-bottom:2px solid var(--ink)}
.label{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.07em;color:var(--muted)}
.kv-grid{padding:14px 18px;display:grid;grid-template-columns:160px 1fr;gap:6px 16px;font-family:var(--mono);font-size:13px;line-height:1.6}
.kv-grid .k{color:var(--muted);font-weight:600;padding:3px 0}
.kv-grid .v{font-weight:700;word-break:break-all;padding:3px 0}
.kv-grid .v.none{color:var(--subtle);font-weight:600;font-style:italic}
.note{padding:12px 18px;font-size:12px;font-weight:600;color:var(--muted);background:var(--surface);border:2px solid var(--subtle);border-radius:12px;line-height:1.55}
.note b{color:var(--ink);font-weight:800}
.loading{padding:32px;text-align:center;color:var(--muted);font-weight:700}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:480px){.kv-grid{grid-template-columns:110px 1fr;font-size:12px}}
</style>
</head>
<body>
<div class="page">
  <header>
    <a class="logo" href="//hrz.lol">hrz<span>.lol</span></a>
    <a class="nav-link" href="//hrz.lol">all tools</a>
  </header>

  <div class="wrap">
    <div class="hero">
      <div class="hero-label">your public IP</div>
      <div class="hero-ip" id="heroIp">…</div>
      <div class="hero-actions">
        <span class="hero-pill" id="kindPill"></span>
        <button class="copy" id="copyBtn">copy</button>
      </div>
    </div>

    <div class="card">
      <div class="card-head"><div class="label">details</div></div>
      <div class="kv-grid" id="details"><div class="loading">loading…</div></div>
    </div>

    <div class="note">
      <b>this page sees</b> only what your browser sends and your CDN edge sees: IP, country (from Cloudflare), reverse DNS,
      user-agent, language. no third-party trackers, no logs kept.
    </div>
  </div>
</div>

<script>
async function load() {
  const r = await fetch('/api/ip');
  const d = await r.json();
  document.getElementById('heroIp').textContent = d.ip || 'unknown';
  document.getElementById('kindPill').textContent = [d.family, d.kind].filter(Boolean).join(' · ');

  const fields = [
    ['IP', d.ip],
    ['family', d.family],
    ['kind', d.kind],
    ['reverse DNS', d.reverse],
    ['country', d.country],
    ['CF-Ray', d.cf_ray],
    ['user-agent', d.user_agent],
    ['accept-language', d.accept_language],
  ];
  const det = document.getElementById('details');
  det.innerHTML = '';
  for (const [k, v] of fields) {
    const ks = document.createElement('div'); ks.className = 'k'; ks.textContent = k;
    const vs = document.createElement('div'); vs.className = 'v' + (v ? '' : ' none'); vs.textContent = v || '–';
    det.appendChild(ks); det.appendChild(vs);
  }
}

document.getElementById('copyBtn').addEventListener('click', e => {
  navigator.clipboard.writeText(document.getElementById('heroIp').textContent);
  e.target.textContent = 'copied'; e.target.classList.add('ok');
  setTimeout(() => { e.target.textContent = 'copy'; e.target.classList.remove('ok'); }, 1000);
});

load().catch(e => { document.getElementById('heroIp').textContent = 'error'; document.getElementById('details').innerHTML = '<div class="loading">failed to load</div>'; });
</script>
<script src="/footer.js?v=3" defer></script>
</body>
</html>
