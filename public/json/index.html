<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON Formatter &amp; Validator – hrz.lol</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #faf8f3; --white: #fff; --ink: #111; --muted: #777770;
  --subtle: #c4c2ba; --surface: #f3f0e8; --accent: #f0c040; --font: 'Nunito', sans-serif;
  --mono: 'JetBrains Mono', 'Courier New', monospace;
  --red: #c0392b; --blue: #1a5fa8; --green: #1a7a41; --purple: #6c3483; --orange: #b7590a;
}
html, body { height: 100%; overflow: hidden; }
a { -webkit-tap-highlight-color: transparent; }
a:focus { outline: none; }
body { background: var(--bg); color: var(--ink); font-family: var(--font); display: flex; flex-direction: column; }

.topbar {
  display: flex; align-items: center; gap: 10px; padding: 10px 20px;
  background: var(--white); border-bottom: 2.5px solid var(--ink); flex-shrink: 0;
}
.logo { font-weight: 900; font-size: 20px; letter-spacing: -0.04em; text-decoration: none; color: var(--ink); }
.logo span { color: var(--muted); }
.sep { width: 1px; height: 20px; background: var(--subtle); }
.title { font-size: 14px; font-weight: 800; color: var(--muted); }

.toolbar { display: flex; align-items: center; gap: 6px; margin-left: auto; }
.tb-btn {
  padding: 6px 14px; border: 2px solid var(--ink); border-radius: 8px;
  font-family: var(--font); font-size: 12px; font-weight: 800; cursor: pointer;
  background: var(--white); transition: background .1s, transform .1s;
}
.tb-btn:hover { background: var(--surface); transform: translateY(-1px); }
.tb-btn.accent { background: var(--accent); }
.tb-btn.accent:hover { background: #e8b82a; }
.tb-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

.status-pill {
  padding: 5px 12px; border-radius: 999px; font-size: 11px; font-weight: 800;
  border: 2px solid transparent; transition: all .2s;
}
.status-pill.ok    { background: #d5f5e3; border-color: #27ae60; color: #1a7a41; }
.status-pill.err   { background: #fadbd8; border-color: #e74c3c; color: #b03030; }
.status-pill.empty { background: var(--surface); border-color: var(--subtle); color: var(--muted); }
.status-text { font-size: 12px; font-weight: 700; color: var(--muted); }

.layout { display: flex; flex: 1; overflow: hidden; }

.panel-input { flex: 1; display: flex; flex-direction: column; border-right: 2.5px solid var(--ink); }
.panel-header {
  padding: 9px 16px; background: var(--surface); border-bottom: 2px solid var(--ink);
  font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--muted); display: flex; align-items: center; gap: 8px;
}
.panel-header span { margin-left: auto; font-size: 11px; font-weight: 700; color: var(--subtle); }
textarea {
  flex: 1; resize: none; border: none; outline: none; padding: 16px;
  font-family: var(--mono); font-size: 13px; line-height: 1.6;
  background: var(--white); color: var(--ink);
}
textarea::placeholder { color: var(--subtle); }

.panel-output { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.output-area { flex: 1; overflow: auto; padding: 0; }

.tree { padding: 12px 16px; font-family: var(--mono); font-size: 13px; font-weight: 500; line-height: 1.9; }
.tree-node { }
.tree-key {
  color: var(--blue); cursor: pointer; user-select: none; font-weight: 600;
  border-radius: 3px; padding: 0 2px; transition: background .1s;
}
.tree-key:hover { background: #d6eaf8; }
.tree-toggle {
  display: inline-block; width: 14px; text-align: center; cursor: pointer;
  color: var(--subtle); font-size: 11px; user-select: none;
}
.tree-toggle:hover { color: var(--ink); }
.tree-children { margin-left: 22px; border-left: 2px solid var(--surface); padding-left: 8px; }
.tree-children.collapsed { display: none; }
.tree-summary {
  color: var(--subtle); font-size: 11px; cursor: pointer;
  display: none;
}
.tree-summary:hover { color: var(--muted); }

.v-string { color: var(--green); font-weight: 600; }
.v-number { color: var(--orange); font-weight: 700; }
.v-bool   { color: var(--purple); font-weight: 700; }
.v-null   { color: var(--red); font-weight: 700; }

.copy-path-toast {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: var(--ink); color: #fff; padding: 8px 18px; border-radius: 10px;
  font-size: 13px; font-weight: 700; pointer-events: none;
  opacity: 0; transition: opacity .2s; z-index: 1000;
}
.copy-path-toast.show { opacity: 1; }

.error-block {
  padding: 16px; background: #fff5f5; border-left: 4px solid var(--red);
  font-family: monospace; font-size: 13px; font-weight: 600; color: var(--red);
  white-space: pre-wrap;
}

.stats-bar {
  padding: 7px 16px; background: var(--surface); border-top: 2px solid var(--ink);
  display: flex; gap: 16px; font-size: 11px; font-weight: 700; color: var(--muted);
  flex-shrink: 0;
}
.stats-bar b { color: var(--ink); }

@media (max-width: 640px) {
  .topbar { flex-wrap: nowrap; overflow-x: auto; gap: 6px; padding: 8px 12px; }
  .toolbar { gap: 4px; }
  .tb-btn { padding: 5px 10px; font-size: 11px; }
  .layout { flex-direction: column; }
  .panel-input { border-right: none; border-bottom: 2.5px solid var(--ink); flex: none; height: 40vh; }
  .panel-output { flex: 1; }
}
</style>
<meta property="og:image" content="https://hrz.lol/og/json.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://hrz.lol/og/json.png">
</head>
<body>

<div class="topbar">
  <a class="logo" href="//hrz.lol">hrz<span>.lol</span></a>
  <div class="sep"></div>
  <div class="title">json</div>
  <div class="toolbar">
    <div class="status-pill empty" id="statusPill">–</div>
    <div class="sep"></div>
    <button class="tb-btn" id="formatBtn" onclick="format()">format</button>
    <button class="tb-btn" id="minifyBtn" onclick="minify()">minify</button>
    <button class="tb-btn" id="expandAllBtn" onclick="expandAll()">expand all</button>
    <button class="tb-btn" id="collapseAllBtn" onclick="collapseAll()">collapse all</button>
    <button class="tb-btn accent" id="copyBtn" onclick="copyFormatted()">copy</button>
    <button class="tb-btn" id="clearBtn" onclick="clearAll()">clear</button>
  </div>
</div>

<div class="layout">
  <div class="panel-input">
    <div class="panel-header">
      input
      <span id="inputStats"></span>
    </div>
    <textarea id="inputArea" placeholder='paste json here...&#10;&#10;{"name":"hrz","tools":["json","paste","draw"]}'
              spellcheck="false" autocomplete="off"></textarea>
  </div>
  <div class="panel-output">
    <div class="panel-header">
      tree view
      <span id="pathDisplay" style="font-family:monospace;font-size:11px;color:var(--blue);max-width:60%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
    </div>
    <div class="output-area" id="outputArea">
      <div style="padding:40px;text-align:center;color:var(--subtle);font-size:14px;font-weight:700">
        paste json on the left
      </div>
    </div>
    <div class="stats-bar" id="statsBar" style="display:none">
      <span>keys: <b id="statKeys">0</b></span>
      <span>depth: <b id="statDepth">0</b></span>
      <span>size: <b id="statSize">0 b</b></span>
    </div>
  </div>
</div>

<div class="copy-path-toast" id="toast"></div>

<script>
let parsedData = null;
let lastValid  = '';

const inputArea = document.getElementById('inputArea');

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

function setStatus(state, msg) {
  const p = document.getElementById('statusPill');
  p.className = 'status-pill ' + state;
  p.textContent = msg;
}

function humanSize(bytes) {
  if (bytes < 1024) return bytes + ' b';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' kb';
  return (bytes/1024/1024).toFixed(2) + ' mb';
}

function countKeys(obj) {
  if (typeof obj !== 'object' || obj === null) return 0;
  const keys = Object.keys(obj);
  return keys.length + keys.reduce((s, k) => s + countKeys(obj[k]), 0);
}

function getDepth(obj) {
  if (typeof obj !== 'object' || obj === null) return 0;
  return 1 + Math.max(0, ...Object.values(obj).map(getDepth));
}

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function buildTree(val, path = '$', depth = 0) {
  const type = Array.isArray(val) ? 'array' : typeof val;

  if (val === null) return `<span class="v-null">null</span>`;
  if (type === 'boolean') return `<span class="v-bool">${val}</span>`;
  if (type === 'number')  return `<span class="v-number">${val}</span>`;
  if (type === 'string')  {
    const display = val.length > 120 ? escapeHtml(val.slice(0, 120)) + '<span style="color:var(--subtle)">…</span>' : escapeHtml(val);
    const klass = `tree-key v-string`;
    return `<span class="${klass}" title="click to copy value" data-copy="${escapeHtml(val)}" data-path="${escapeHtml(path)}">"${display}"</span>`;
  }

  const isArr  = Array.isArray(val);
  const keys   = Object.keys(val);
  const open   = isArr ? '[' : '{';
  const close  = isArr ? ']' : '}';
  const count  = keys.length;

  if (count === 0) return `${open}${close}`;

  const childId = 'n' + Math.random().toString(36).slice(2);
  const sumId   = 's' + childId;

  const childrenHtml = keys.map(k => {
    const childPath = isArr ? `${path}[${k}]` : `${path}.${k}`;
    const keyHtml   = isArr
      ? `<span class="tree-key" data-path="${escapeHtml(childPath)}" title="click to copy path">${k}</span>`
      : `<span class="tree-key" data-path="${escapeHtml(childPath)}" title="click to copy path">"${escapeHtml(k)}"</span>`;
    return `<div class="tree-node">${keyHtml}: ${buildTree(val[k], childPath, depth+1)},</div>`;
  }).join('');

  return `${open}<span class="tree-toggle" onclick="toggleNode('${childId}','${sumId}')">▾</span>`
    + `<div class="tree-children" id="${childId}">${childrenHtml}</div>`
    + `<span class="tree-summary" id="${sumId}" onclick="toggleNode('${childId}','${sumId}')">${count} item${count!==1?'s':''}</span>`
    + `${close}`;
}

function toggleNode(childId, sumId) {
  const ch  = document.getElementById(childId);
  const sum = document.getElementById(sumId);
  const tog = ch.previousElementSibling;
  const collapsed = ch.classList.toggle('collapsed');
  if (sum) sum.style.display = collapsed ? 'inline' : 'none';
  if (tog && tog.classList.contains('tree-toggle')) tog.textContent = collapsed ? '▸' : '▾';
}

function expandAll() {
  document.querySelectorAll('.tree-children').forEach(el => {
    el.classList.remove('collapsed');
    const tog = el.previousElementSibling;
    if (tog?.classList.contains('tree-toggle')) tog.textContent = '▾';
  });
  document.querySelectorAll('.tree-summary').forEach(el => el.style.display = 'none');
}

function collapseAll() {
  document.querySelectorAll('.tree-children').forEach(el => {
    el.classList.add('collapsed');
    const tog = el.previousElementSibling;
    if (tog?.classList.contains('tree-toggle')) tog.textContent = '▸';
  });
  document.querySelectorAll('.tree-summary').forEach(el => el.style.display = 'inline');
}

function renderTree(data) {
  const out = document.getElementById('outputArea');
  const html = buildTree(data);
  out.innerHTML = `<div class="tree"><div class="tree-node">${html}</div></div>`;

  out.querySelectorAll('.tree-key[data-path]').forEach(el => {
    el.onclick = (e) => {
      e.stopPropagation();
      const path = el.dataset.path;
      navigator.clipboard.writeText(path);
      document.getElementById('pathDisplay').textContent = path;
      showToast('path copied: ' + path);
    };
  });
  out.querySelectorAll('.tree-key[data-copy]').forEach(el => {
    el.onclick = (e) => {
      e.stopPropagation();
      navigator.clipboard.writeText(el.dataset.copy);
      showToast('value copied');
    };
  });

  document.getElementById('statsBar').style.display = 'flex';
  document.getElementById('statKeys').textContent  = countKeys(data);
  document.getElementById('statDepth').textContent = getDepth(data);
  document.getElementById('statSize').textContent  = humanSize(new TextEncoder().encode(JSON.stringify(data)).length);
}

function parse(text) {
  if (!text.trim()) {
    parsedData = null;
    setStatus('empty', '–');
    document.getElementById('outputArea').innerHTML = '<div style="padding:40px;text-align:center;color:var(--subtle);font-size:14px;font-weight:700">paste json on the left</div>';
    document.getElementById('statsBar').style.display = 'none';
    return;
  }
  try {
    parsedData = JSON.parse(text);
    lastValid  = text;
    setStatus('ok', 'valid json');
    renderTree(parsedData);
  } catch (e) {
    parsedData = null;
    setStatus('err', 'invalid');
    document.getElementById('outputArea').innerHTML = `<div class="error-block">${escapeHtml(e.message)}</div>`;
    document.getElementById('statsBar').style.display = 'none';
  }
}

function format() {
  const text = inputArea.value.trim();
  if (!text) return;
  try {
    const data = JSON.parse(text);
    inputArea.value = JSON.stringify(data, null, 2);
    parse(inputArea.value);
  } catch {}
}

function minify() {
  const text = inputArea.value.trim();
  if (!text) return;
  try {
    const data = JSON.parse(text);
    inputArea.value = JSON.stringify(data);
    parse(inputArea.value);
  } catch {}
}

function copyFormatted() {
  if (!parsedData) { showToast('nothing to copy'); return; }
  navigator.clipboard.writeText(JSON.stringify(parsedData, null, 2));
  showToast('copied!');
}

function clearAll() {
  inputArea.value = '';
  parsedData = null;
  parse('');
  document.getElementById('inputStats').textContent = '';
  document.getElementById('pathDisplay').textContent = '';
}

let debounce = null;
inputArea.addEventListener('input', () => {
  const len = inputArea.value.length;
  document.getElementById('inputStats').textContent = len ? `${len.toLocaleString()} chars` : '';
  clearTimeout(debounce);
  debounce = setTimeout(() => parse(inputArea.value), 300);
});

inputArea.addEventListener('keydown', e => {
  if (e.key === 'Tab') {
    e.preventDefault();
    const s = inputArea.selectionStart;
    inputArea.value = inputArea.value.slice(0, s) + '  ' + inputArea.value.slice(inputArea.selectionEnd);
    inputArea.selectionStart = inputArea.selectionEnd = s + 2;
  }
  if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'F') { e.preventDefault(); format(); }
});
</script>
</body>
</html>
