<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXIF Viewer & Stripper – hrz.lol</title>
<meta name="description" content="See and remove EXIF metadata from your photos. All processing happens in your browser.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;600;700;800;900&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/exifr@7.1.3/dist/full.umd.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
a{-webkit-tap-highlight-color:transparent;color:inherit;text-decoration:none}
button{font-family:inherit;-webkit-tap-highlight-color:transparent}
:root{--bg:#faf8f3;--white:#fff;--ink:#111;--muted:#777770;--subtle:#c4c2ba;--surface:#f3f0e8;--accent:#f0c040;--font:'Nunito',sans-serif;--mono:'JetBrains Mono',monospace}
html,body{height:100%}
body{background:var(--bg);color:var(--ink);font-family:var(--font);overflow-x:hidden}
.page{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:0 20px 48px}
header{width:100%;max-width:760px;display:flex;align-items:center;justify-content:space-between;padding:24px 0 28px;animation:fadeUp .4s ease both}
.logo{font-size:22px;font-weight:900;letter-spacing:-0.04em;color:var(--ink)}
.logo span{color:var(--muted)}
.nav-link{font-size:12px;font-weight:800;color:var(--muted);padding:4px 12px;border:2px solid var(--subtle);border-radius:999px;transition:border-color .15s,color .15s}
.nav-link:hover{border-color:var(--ink);color:var(--ink)}
.wrap{width:100%;max-width:760px;display:flex;flex-direction:column;gap:18px;animation:fadeUp .4s .06s ease both}
.drop{border:3px dashed var(--subtle);border-radius:18px;padding:54px 24px;text-align:center;background:var(--white);transition:border-color .15s,background .15s;cursor:pointer}
.drop:hover,.drop.over{border-color:var(--ink);background:#fdfaf2}
.drop h2{font-size:20px;font-weight:900;letter-spacing:-.02em;margin-bottom:6px}
.drop p{font-size:13px;font-weight:700;color:var(--muted)}
.preview-wrap{display:none;gap:14px;flex-direction:column}
.preview-wrap.show{display:flex}
.preview-card{background:var(--white);border:2.5px solid var(--ink);border-radius:18px;box-shadow:3px 4px 0 var(--ink);overflow:hidden}
.preview-head{padding:10px 18px;background:var(--surface);border-bottom:2px solid var(--ink);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.label{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.07em;color:var(--muted)}
.preview-img{max-width:100%;max-height:340px;display:block;margin:0 auto;padding:18px}
.action-row{display:flex;flex-wrap:wrap;gap:10px;padding:0 18px 18px}
.btn{padding:10px 18px;border:2.5px solid var(--ink);border-radius:10px;background:var(--accent);font-size:13px;font-weight:900;cursor:pointer;color:var(--ink);box-shadow:2px 3px 0 var(--ink);transition:transform .12s,box-shadow .12s;flex:1;min-width:140px}
.btn:hover{transform:translateY(-1px);box-shadow:3px 4px 0 var(--ink)}
.btn:active{transform:scale(.96);box-shadow:1px 2px 0 var(--ink)}
.btn.outline{background:var(--white)}
.table{font-family:var(--mono);font-size:13px;line-height:1.65;padding:14px 18px;max-height:520px;overflow-y:auto}
.kv{display:grid;grid-template-columns:170px 1fr;padding:6px 0;border-bottom:1px solid var(--surface);gap:14px}
.kv:last-child{border-bottom:none}
.kv .k{color:var(--muted);font-weight:600}
.kv .v{font-weight:700;word-break:break-all}
.section-title{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;color:var(--ink);margin:10px 0 4px;padding-top:10px;border-top:2px dashed var(--subtle)}
.section-title:first-child{margin-top:0;padding-top:0;border-top:none}
.gps-map{padding:14px 18px;font-size:13px;color:var(--muted)}
.gps-map a{color:var(--ink);font-weight:800;text-decoration:underline}
.warn{padding:12px 18px;background:#fff7df;color:#7a5a00;border:2px solid #f0c040;border-radius:12px;font-weight:700;font-size:13px}
.no-exif{padding:24px;text-align:center;color:var(--muted);font-weight:700}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="page">
  <header>
    <a class="logo" href="//hrz.lol">hrz<span>.lol</span></a>
    <a class="nav-link" href="//hrz.lol">all tools</a>
  </header>

  <div class="wrap">
    <div class="drop" id="drop">
      <input type="file" id="file" accept="image/*" style="display:none">
      <h2>drop image here</h2>
      <p>or click to choose · jpg, png, heic, tiff &middot; processed in your browser</p>
    </div>

    <div class="preview-wrap" id="previewWrap">
      <div class="preview-card">
        <div class="preview-head">
          <div class="label" id="fileLabel">image.jpg</div>
          <div class="label" id="sizeLabel"></div>
        </div>
        <img class="preview-img" id="img" alt="preview">
        <div class="action-row">
          <button class="btn" onclick="stripExif()">download cleaned</button>
          <button class="btn outline" onclick="reset()">load another</button>
        </div>
      </div>

      <div id="warnBox" style="display:none"></div>

      <div class="preview-card" id="dataCard">
        <div class="preview-head"><div class="label">metadata</div></div>
        <div class="table" id="meta"></div>
      </div>
    </div>
  </div>
</div>

<script>
const drop = document.getElementById('drop');
const fileIn = document.getElementById('file');
const previewWrap = document.getElementById('previewWrap');
const img = document.getElementById('img');
const meta = document.getElementById('meta');
const fileLabel = document.getElementById('fileLabel');
const sizeLabel = document.getElementById('sizeLabel');
const warnBox = document.getElementById('warnBox');

let currentFile = null;

drop.addEventListener('click', () => fileIn.click());
fileIn.addEventListener('change', e => e.target.files[0] && load(e.target.files[0]));
drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('over'); });
drop.addEventListener('dragleave', () => drop.classList.remove('over'));
drop.addEventListener('drop', e => {
  e.preventDefault(); drop.classList.remove('over');
  if (e.dataTransfer.files[0]) load(e.dataTransfer.files[0]);
});

async function load(file) {
  currentFile = file;
  fileLabel.textContent = file.name;
  sizeLabel.textContent = formatBytes(file.size);
  img.src = URL.createObjectURL(file);
  drop.style.display = 'none';
  previewWrap.classList.add('show');

  let exif = null;
  try {
    exif = await exifr.parse(file, { gps: true, exif: true, iptc: true, xmp: true, jfif: true, ihdr: true, tiff: true });
  } catch (e) {}

  meta.innerHTML = '';
  warnBox.style.display = 'none';

  if (!exif || Object.keys(exif).length === 0) {
    meta.innerHTML = '<div class="no-exif">no EXIF metadata found &ndash; image is already clean.</div>';
    return;
  }

  const sections = {
    'Camera': ['Make', 'Model', 'LensModel', 'LensMake'],
    'Capture': ['DateTimeOriginal', 'CreateDate', 'ModifyDate', 'ExposureTime', 'FNumber', 'ISO', 'FocalLength', 'FocalLengthIn35mmFormat', 'Flash', 'WhiteBalance'],
    'Image': ['ImageWidth', 'ImageHeight', 'ExifImageWidth', 'ExifImageHeight', 'Orientation', 'XResolution', 'YResolution', 'ColorSpace'],
    'Location': ['latitude', 'longitude', 'GPSAltitude', 'GPSDateStamp', 'GPSTimeStamp'],
    'Software': ['Software', 'HostComputer', 'Artist', 'Copyright'],
  };
  const usedKeys = new Set();

  for (const [secName, keys] of Object.entries(sections)) {
    const present = keys.filter(k => exif[k] !== undefined && exif[k] !== null && exif[k] !== '');
    if (!present.length) continue;
    const title = document.createElement('div');
    title.className = 'section-title';
    title.textContent = secName;
    meta.appendChild(title);
    for (const k of present) {
      usedKeys.add(k);
      const v = formatVal(exif[k]);
      const row = document.createElement('div');
      row.className = 'kv';
      row.innerHTML = `<div class="k"></div><div class="v"></div>`;
      row.querySelector('.k').textContent = k;
      row.querySelector('.v').textContent = v;
      meta.appendChild(row);
    }
  }

  const other = Object.keys(exif).filter(k => !usedKeys.has(k) && exif[k] !== undefined && exif[k] !== null && exif[k] !== '');
  if (other.length) {
    const title = document.createElement('div');
    title.className = 'section-title';
    title.textContent = 'Other';
    meta.appendChild(title);
    for (const k of other) {
      const v = formatVal(exif[k]);
      if (v.length > 200) continue;
      const row = document.createElement('div');
      row.className = 'kv';
      row.innerHTML = `<div class="k"></div><div class="v"></div>`;
      row.querySelector('.k').textContent = k;
      row.querySelector('.v').textContent = v;
      meta.appendChild(row);
    }
  }

  if (exif.latitude && exif.longitude) {
    const link = document.createElement('div');
    link.className = 'gps-map';
    link.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:4px"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg><a target="_blank" rel="noopener">open in OpenStreetMap</a>`;
    link.querySelector('a').href = `https://www.openstreetmap.org/?mlat=${exif.latitude}&mlon=${exif.longitude}#map=14/${exif.latitude}/${exif.longitude}`;
    meta.appendChild(link);
    warnBox.innerHTML = `<div class="warn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-3px;margin-right:6px"><path d="M12 9v4M12 17h.01M10.3 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z"/></svg>This photo contains GPS coordinates. Remove with "download cleaned" before sharing.</div>`;
    warnBox.style.display = 'block';
  }
}

function formatVal(v) {
  if (v instanceof Date) return v.toISOString().replace('T', ' ').slice(0, 19);
  if (Array.isArray(v)) return v.join(', ');
  if (typeof v === 'object') return JSON.stringify(v);
  if (typeof v === 'number') return v % 1 === 0 ? v.toString() : v.toFixed(4);
  return String(v);
}

function formatBytes(b) {
  if (b < 1024) return b + ' B';
  if (b < 1024 * 1024) return (b / 1024).toFixed(1) + ' KB';
  return (b / 1024 / 1024).toFixed(1) + ' MB';
}

async function stripExif() {
  if (!currentFile) return;
  const im = new Image();
  im.src = URL.createObjectURL(currentFile);
  await new Promise(r => im.onload = r);
  const canvas = document.createElement('canvas');
  canvas.width = im.naturalWidth;
  canvas.height = im.naturalHeight;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(im, 0, 0);
  const isPng = currentFile.type === 'image/png';
  const mime = isPng ? 'image/png' : 'image/jpeg';
  canvas.toBlob(blob => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    const base = currentFile.name.replace(/\.[^.]+$/, '');
    a.download = `${base}-clean.${isPng ? 'png' : 'jpg'}`;
    a.click();
  }, mime, 0.95);
}

function reset() {
  currentFile = null;
  fileIn.value = '';
  previewWrap.classList.remove('show');
  drop.style.display = '';
  meta.innerHTML = '';
  warnBox.style.display = 'none';
}
</script>
<script src="/footer.js?v=3" defer></script>
</body>
</html>
