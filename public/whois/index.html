<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WHOIS Lookup – Domain Info – hrz.lol</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;600;700;800;900&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
a{-webkit-tap-highlight-color:transparent}a:focus{outline:none}a:focus-visible{outline:2px solid var(--ink);outline-offset:3px}
:root{--bg:#faf8f3;--white:#fff;--ink:#111;--muted:#777770;--subtle:#c4c2ba;--surface:#f3f0e8;--accent:#f0c040;--font:'Nunito',sans-serif;--mono:'JetBrains Mono',monospace}
html,body{height:100%}
body{background:var(--bg);color:var(--ink);font-family:var(--font);overflow-x:hidden}
.page{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:0 20px 48px}
header{width:100%;max-width:720px;display:flex;align-items:center;justify-content:space-between;padding:24px 0 28px;animation:fadeUp .4s ease both}
.logo{font-size:22px;font-weight:900;letter-spacing:-0.04em;text-decoration:none;color:var(--ink)}
.logo span{color:var(--muted)}
.nav-link{font-size:12px;font-weight:800;color:var(--muted);text-decoration:none;padding:4px 12px;border:2px solid var(--subtle);border-radius:999px;transition:border-color .15s,color .15s}
.nav-link:hover{border-color:var(--ink);color:var(--ink)}

.wrap{width:100%;max-width:720px;display:flex;flex-direction:column;gap:16px;animation:fadeUp .4s .06s ease both}

.search-card{background:var(--white);border:2.5px solid var(--ink);border-radius:18px;padding:20px;box-shadow:3px 4px 0 var(--ink)}
.input-label{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:0.07em;color:var(--muted);margin-bottom:8px;display:block}
.search-row{display:flex;gap:10px}
input[type=text]{flex:1;padding:11px 14px;border:2px solid var(--subtle);border-radius:12px;font-family:var(--mono);font-size:13px;background:var(--bg);color:var(--ink);outline:none;transition:border-color .15s,box-shadow .15s}
input[type=text]:focus{border-color:var(--ink);box-shadow:3px 3px 0 var(--ink)}
input[type=text]::placeholder{color:var(--subtle)}
.search-btn{padding:10px 22px;background:var(--accent);color:var(--ink);border:2.5px solid var(--ink);border-radius:12px;font-family:var(--font);font-size:13px;font-weight:900;cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:2px 3px 0 var(--ink);white-space:nowrap}
.search-btn:hover{transform:translateY(-2px);box-shadow:3px 5px 0 var(--ink)}
.search-btn:active{transform:scale(.97)}
.search-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

.result-card{background:var(--white);border:2.5px solid var(--ink);border-radius:18px;overflow:hidden;box-shadow:3px 4px 0 var(--ink);display:none}
.result-card.show{display:block}
.sec-head{display:flex;align-items:center;justify-content:space-between;padding:10px 18px;background:var(--surface);border-bottom:2px solid var(--ink)}
.sec-label{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:0.07em;color:var(--muted)}
.status-chips{display:flex;gap:6px;flex-wrap:wrap;padding:14px 18px 8px}
.chip{padding:3px 10px;border-radius:999px;font-size:10px;font-weight:800;border:1.5px solid var(--subtle);background:var(--surface);color:var(--muted)}

.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:0}
.info-row{display:flex;flex-direction:column;padding:12px 18px;border-bottom:1px solid #eeebe2}
.info-row:nth-last-child(-n+2){border-bottom:none}
.info-key{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:3px}
.info-val{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--ink)}
.info-val.empty{color:var(--subtle);font-style:italic}

.ns-list{padding:12px 18px;display:flex;flex-direction:column;gap:4px}
.ns-item{font-family:var(--mono);font-size:12px;font-weight:600;padding:5px 10px;background:var(--surface);border-radius:6px}

.raw-toggle{font-size:11px;font-weight:800;color:var(--muted);cursor:pointer;padding:10px 18px;display:block;border-top:1.5px solid #eeebe2}
.raw-toggle:hover{color:var(--ink)}
.raw-pre{padding:14px 18px;font-family:var(--mono);font-size:10px;line-height:1.5;overflow-x:auto;white-space:pre-wrap;word-break:break-all;border-top:1px solid #eeebe2;display:none;background:var(--surface)}
.raw-pre.show{display:block}

.spinner{display:inline-block;width:13px;height:13px;border:2.5px solid rgba(0,0,0,.2);border-top-color:var(--ink);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.err-card{background:var(--white);border:2.5px solid #e74c3c;border-radius:18px;padding:16px 20px;box-shadow:3px 4px 0 #e74c3c;display:none;color:#c0392b;font-weight:700;font-size:13px}
.err-card.show{display:block}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@media(max-width:600px){
  .page{padding:0 14px 36px}
  header{padding:18px 0 20px}
  .search-row{flex-direction:column}
  .search-btn{width:100%}
  .info-grid{grid-template-columns:1fr}
  .info-row:last-child{border-bottom:none}
}
</style>
<meta name="description" content="Look up domain registration info, nameservers, registrar, owner and expiry date. Fast and free WHOIS lookup.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://whois.hrz.lol/">
<meta property="og:title" content="WHOIS Lookup – Domain Info – hrz.lol">
<meta property="og:description" content="Look up domain registration info, nameservers, registrar, owner and expiry date. Fast and free WHOIS lookup.">
<meta name="twitter:title" content="WHOIS Lookup – Domain Info – hrz.lol">
<meta name="twitter:description" content="Look up domain registration info, nameservers, registrar, owner and expiry date. Fast and free WHOIS lookup.">
<meta property="og:image" content="https://hrz.lol/og/whois.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://hrz.lol/og/whois.png">
</head>
<body>
<div class="page">
  <header>
    <a class="logo" href="//hrz.lol">hrz<span>.lol</span></a>
    <a class="nav-link" href="//hrz.lol">all tools</a>
  </header>

  <div class="wrap">
    <div class="search-card">
      <label class="input-label">domain</label>
      <div class="search-row">
        <input type="text" id="domainInput" placeholder="example.com" spellcheck="false" autocomplete="off" autocapitalize="none">
        <button class="search-btn" id="lookupBtn" onclick="lookup()">lookup</button>
      </div>
    </div>

    <div class="err-card" id="errCard"></div>

    <div class="result-card" id="resultCard">
      <div class="sec-head">
        <span class="sec-label" id="domainTitle">domain</span>
        <span id="availBadge"></span>
      </div>
      <div class="status-chips" id="statusChips"></div>

      <div class="info-grid" id="infoGrid"></div>

      <div class="sec-head" style="border-top:2px solid var(--ink)"><span class="sec-label">nameservers</span></div>
      <div class="ns-list" id="nsList"></div>

      <span class="raw-toggle" onclick="toggleRaw(this)">show raw RDAP ▾</span>
      <pre class="raw-pre" id="rawPre"></pre>
    </div>
  </div>
</div>

<script>
async function lookup() {
  const domain = document.getElementById('domainInput').value.trim().toLowerCase()
    .replace(/^https?:\/\//i, '').replace(/\/.*$/, '');

  if (!domain) return;

  const btn = document.getElementById('lookupBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';
  document.getElementById('errCard').classList.remove('show');
  document.getElementById('resultCard').classList.remove('show');

  try {
    const res  = await fetch(`/api/whois?domain=${encodeURIComponent(domain)}`);
    const data = await res.json();

    if (!res.ok) {
      document.getElementById('errCard').textContent = data.error || 'lookup failed';
      document.getElementById('errCard').classList.add('show');
      return;
    }

    document.getElementById('domainTitle').textContent = data.domain;

    const chips = document.getElementById('statusChips');
    chips.innerHTML = (data.status || []).map(s => `<span class="chip">${esc(s)}</span>`).join('') || '<span style="color:var(--subtle);font-size:12px;font-weight:600;padding:0 4px">no status flags</span>';

    const fmtDate = d => d ? new Date(d).toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' }) : null;
    const infoRows = [
      { key: 'registered',  val: fmtDate(data.registered) },
      { key: 'updated',     val: fmtDate(data.updated) },
      { key: 'expires',     val: fmtDate(data.expires) },
      { key: 'registrar',   val: data.registrar },
    ].filter(r => r.val);

    document.getElementById('infoGrid').innerHTML = infoRows.map(r =>
      `<div class="info-row"><div class="info-key">${r.key}</div><div class="info-val">${esc(r.val)}</div></div>`
    ).join('');

    const nsList = document.getElementById('nsList');
    nsList.innerHTML = (data.nameservers || []).map(ns =>
      `<div class="ns-item">${esc(ns.toLowerCase())}</div>`
    ).join('') || '<span style="color:var(--subtle);font-size:12px;font-weight:600">none found</span>';

    document.getElementById('rawPre').textContent = JSON.stringify(data.raw, null, 2);
    document.getElementById('resultCard').classList.add('show');
  } catch {
    document.getElementById('errCard').textContent = 'network error - could not reach server';
    document.getElementById('errCard').classList.add('show');
  } finally {
    btn.disabled = false;
    btn.textContent = 'lookup';
  }
}

function toggleRaw(el) {
  const pre = document.getElementById('rawPre');
  const open = pre.classList.toggle('show');
  el.textContent = (open ? 'hide' : 'show') + ' raw RDAP ' + (open ? '▴' : '▾');
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

document.getElementById('domainInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') lookup();
});
</script>
<script src="/footer.js?v=3" defer></script>
</body>
</html>
