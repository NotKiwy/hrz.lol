<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open Graph &amp; Meta Preview – hrz.lol</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
a{-webkit-tap-highlight-color:transparent}a:focus{outline:none}a:focus-visible{outline:2px solid var(--ink);outline-offset:3px}
:root{--bg:#faf8f3;--white:#fff;--ink:#111;--muted:#777770;--subtle:#c4c2ba;--surface:#f3f0e8;--accent:#f0c040;--font:'Nunito',sans-serif}
body{background:var(--bg);color:var(--ink);font-family:var(--font);min-height:100vh;padding:0 20px 60px}
.page{max-width:780px;margin:0 auto}
header{display:flex;align-items:center;gap:12px;padding:24px 0 32px}
.logo{font-size:22px;font-weight:900;letter-spacing:-0.04em;text-decoration:none;color:var(--ink)}
.logo span{color:var(--muted)}
h1{font-size:28px;font-weight:900;letter-spacing:-0.04em;margin-bottom:6px}
.sub{font-size:14px;font-weight:600;color:var(--muted);margin-bottom:28px}

.input-row{display:flex;gap:0;border:2.5px solid var(--ink);border-radius:16px;overflow:hidden;box-shadow:3px 4px 0 var(--ink);margin-bottom:28px;background:var(--white)}
.input-row input{flex:1;padding:14px 18px;border:none;outline:none;font-family:var(--font);font-size:15px;font-weight:700;background:transparent;color:var(--ink)}
.input-row input::placeholder{color:var(--subtle)}
.fetch-btn{padding:0 24px;background:var(--accent);border:none;border-left:2.5px solid var(--ink);font-family:var(--font);font-size:14px;font-weight:900;cursor:pointer;transition:opacity .1s;white-space:nowrap}
.fetch-btn:hover{opacity:.85}
.fetch-btn:disabled{opacity:.4}

.error{background:#fff0f0;border:2px solid #e87070;border-radius:12px;padding:12px 16px;font-size:13px;font-weight:700;color:#c03030;margin-bottom:20px;display:none}
.error.show{display:block}

.previews{display:grid;gap:20px}

.raw-card{background:var(--white);border:2.5px solid var(--ink);border-radius:18px;padding:20px 24px;box-shadow:3px 4px 0 var(--ink)}
.card-label{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);margin-bottom:14px}
.meta-grid{display:grid;gap:8px}
.meta-row{display:grid;grid-template-columns:140px 1fr;gap:12px;align-items:start;padding:7px 10px;border-radius:8px}
.meta-row:hover{background:var(--surface)}
.meta-key{font-size:12px;font-weight:800;color:var(--muted)}
.meta-val{font-size:13px;font-weight:600;word-break:break-all}

.link-preview{background:var(--white);border:2.5px solid var(--ink);border-radius:18px;overflow:hidden;box-shadow:3px 4px 0 var(--ink)}
.preview-inner{border:1.5px solid #e1e8ed;border-radius:14px;margin:16px;overflow:hidden}
.preview-image{width:100%;max-height:220px;object-fit:cover;display:block}
.preview-text{padding:12px 14px 14px;background:#fff}
.preview-site{font-size:12px;color:#536471;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:0.03em}
.preview-favicon{width:14px;height:14px;border-radius:3px}
.preview-title{font-size:15px;font-weight:800;color:#0f1419;margin-bottom:4px;line-height:1.3}
.preview-desc{font-size:13px;color:#536471;line-height:1.4}

.spinner{display:inline-block;width:16px;height:16px;border:2.5px solid rgba(0,0,0,.15);border-top-color:var(--ink);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{display:flex;align-items:center;gap:10px;font-size:14px;font-weight:700;color:var(--muted);padding:20px 0}

@media(max-width:600px){
  body{padding:0 14px 40px}
  header{padding:18px 0 20px}
  h1{font-size:24px}
  .input-row input{font-size:14px;padding:12px 14px}
  .fetch-btn{padding:0 16px;font-size:13px}
  .meta-row{grid-template-columns:100px 1fr;gap:8px}
  .raw-card{padding:16px 18px}
}
</style>
<meta name="description" content="Preview how any URL appears on Twitter, Facebook, Slack and iMessage. Inspect Open Graph tags and meta data.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://meta.hrz.lol/">
<meta property="og:title" content="Open Graph & Meta Preview – hrz.lol">
<meta property="og:description" content="Preview how any URL appears on Twitter, Facebook, Slack and iMessage. Inspect Open Graph tags and meta data.">
<meta name="twitter:title" content="Open Graph & Meta Preview – hrz.lol">
<meta name="twitter:description" content="Preview how any URL appears on Twitter, Facebook, Slack and iMessage. Inspect Open Graph tags and meta data.">
<meta property="og:image" content="https://hrz.lol/og/meta.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://hrz.lol/og/meta.png">
</head>
<body>
<div class="page">
  <header><a class="logo" href="//hrz.lol">hrz<span>.lol</span></a></header>
  <h1>meta preview</h1>
  <div class="sub">see how a url looks in telegram, twitter, and what og tags it has</div>

  <div class="input-row">
    <input id="urlInput" type="text" placeholder="https://example.com" autocomplete="off">
    <button class="fetch-btn" id="fetchBtn">preview</button>
  </div>
  <div class="error" id="errEl"></div>
  <div id="output"></div>
</div>

<script>
const urlInput = document.getElementById('urlInput');
const fetchBtn = document.getElementById('fetchBtn');
const errEl    = document.getElementById('errEl');
const output   = document.getElementById('output');

function showErr(msg) { errEl.textContent = msg; errEl.classList.add('show'); }
function hideErr()    { errEl.classList.remove('show'); }

async function doFetch() {
  const url = urlInput.value.trim();
  if (!url) { showErr('enter a url'); return; }
  hideErr(); output.innerHTML = '<div class="loading"><span class="spinner"></span>fetching...</div>';
  fetchBtn.disabled = true;

  try {
    const r = await fetch('/api/meta?url=' + encodeURIComponent(url));
    const d = await r.json();
    if (!r.ok) { showErr(d.error || 'error'); output.innerHTML = ''; return; }
    render(d);
  } catch { showErr('network error'); output.innerHTML = ''; }
  finally { fetchBtn.disabled = false; }
}

function esc(s) { return String(s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function render(d) {
  const rows = [
    ['title',     d.title],
    ['description', d.desc],
    ['og:image',  d.image],
    ['site name', d.siteName],
    ['twitter:card', d.twitterCard],
    ['favicon',   d.favicon],
    ['url',       d.url],
  ].filter(([,v]) => v).map(([k,v]) =>
    `<div class="meta-row"><div class="meta-key">${esc(k)}</div><div class="meta-val">${esc(v)}</div></div>`
  ).join('');

  const imgHtml  = d.image ? `<img class="preview-image" src="${esc(d.image)}" alt="" onerror="this.style.display='none'">` : '';
  const favHtml  = d.favicon ? `<img class="preview-favicon" src="${esc(d.favicon)}" onerror="this.style.display='none'">` : '';

  function previewCard(label, siteLabel, showFav) {
    return `<div class="link-preview">
      <div class="card-label" style="padding:16px 24px 0">${label}</div>
      <div class="preview-inner">
        ${imgHtml}
        <div class="preview-text">
          <div class="preview-site">${showFav ? favHtml : ''}${esc(siteLabel)}</div>
          <div class="preview-title">${esc(d.title)}</div>
          ${d.desc ? `<div class="preview-desc">${esc(d.desc.slice(0,200))}</div>` : ''}
        </div>
      </div>
    </div>`;
  }

  output.innerHTML = `
    <div class="previews">
      <div class="raw-card">
        <div class="card-label">meta tags</div>
        <div class="meta-grid">${rows || '<div style="color:var(--muted);font-size:13px">no meta tags found</div>'}</div>
      </div>
      ${previewCard('telegram preview', d.siteName || d.host, false)}
      ${previewCard('twitter / x preview', d.host, true)}
    </div>`;
}

fetchBtn.onclick = doFetch;
urlInput.addEventListener('keydown', e => { if (e.key === 'Enter') doFetch(); });
</script>
<script src="/footer.js?v=3" defer></script>
</body>
</html>
