<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
<title>Anonymous Chat Rooms – hrz.lol</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #faf8f3; --white: #fff; --ink: #111; --muted: #777770;
  --subtle: #c4c2ba; --surface: #f3f0e8; --accent: #f0c040; --font: 'Nunito', sans-serif;
}
html, body { height: 100%; }
body {
  background: var(--bg); color: var(--ink); font-family: var(--font);
  display: flex; flex-direction: column;
  height: 100dvh; overscroll-behavior: none;
}
button { -webkit-tap-highlight-color: transparent; }

.topbar {
  display: flex; align-items: center; gap: 12px; padding: 12px 20px;
  background: var(--white); border-bottom: 2.5px solid var(--ink);
  position: sticky; top: 0; z-index: 10;
}
.topbar-logo { font-weight: 900; font-size: 18px; letter-spacing: -0.04em; }
.topbar-logo span { color: var(--muted); }
.room-code {
  background: var(--surface); border: 2px solid var(--ink); border-radius: 8px;
  padding: 3px 10px; font-size: 13px; font-weight: 800; letter-spacing: 0.05em;
  font-family: monospace;
}
.user-count {
  margin-left: auto; font-size: 13px; font-weight: 700; color: var(--muted);
}
.copy-btn {
  padding: 5px 12px; background: var(--accent); border: 2px solid var(--ink);
  border-radius: 8px; font-family: var(--font); font-size: 12px; font-weight: 800;
  cursor: pointer; transition: transform .1s;
}
.messages {
  flex: 1; overflow-y: auto; padding: 20px;
  display: flex; flex-direction: column; gap: 6px;
  overscroll-behavior: contain; -webkit-overflow-scrolling: touch;
}
.msg { display: flex; flex-direction: column; max-width: 72%; }
.msg.own { align-self: flex-end; align-items: flex-end; }
.msg.other { align-self: flex-start; align-items: flex-start; }
.msg.system { align-self: center; align-items: center; }

.msg-name { font-size: 11px; font-weight: 800; margin-bottom: 3px; opacity: .8; }
.msg-bubble {
  padding: 9px 14px; border-radius: 16px; border: 2px solid var(--ink);
  font-size: 14px; font-weight: 600; line-height: 1.5; word-break: break-word;
  box-shadow: 2px 2px 0 var(--ink);
}
.msg.own .msg-bubble { background: var(--accent); border-radius: 16px 16px 4px 16px; }
.msg.other .msg-bubble { background: var(--white); border-radius: 16px 16px 16px 4px; }
.msg.system .msg-bubble {
  background: transparent; border: none; box-shadow: none;
  font-size: 12px; color: var(--muted); font-weight: 700; padding: 2px 0;
}

.input-area {
  padding: 14px 20px; background: var(--white); border-top: 2.5px solid var(--ink);
  display: flex; gap: 10px; align-items: center;
}
.input-area input {
  flex: 1; padding: 12px 16px; border: 2.5px solid var(--ink); border-radius: 14px;
  font-family: var(--font); font-size: 15px; font-weight: 700; background: var(--bg);
  outline: none; transition: box-shadow .15s;
}
.input-area input:focus { box-shadow: 3px 3px 0 var(--ink); }
.send-btn {
  padding: 12px 20px; background: var(--accent); border: 2.5px solid var(--ink);
  border-radius: 14px; font-family: var(--font); font-size: 15px; font-weight: 900;
  cursor: pointer; box-shadow: 3px 3px 0 var(--ink); transition: transform .1s, box-shadow .1s;
}
.send-btn:active { transform: scale(.96); box-shadow: 1px 1px 0 var(--ink); }

@media (hover: hover) {
  .copy-btn:hover { transform: translateY(-1px); }
  .send-btn:hover { transform: translateY(-2px); box-shadow: 3px 5px 0 var(--ink); }
}

@media (max-width: 600px) {
  .topbar { padding: 10px 12px; gap: 8px; }
  .topbar-logo { font-size: 15px; }
  .room-code { font-size: 11px; padding: 3px 7px; }
  .user-count { font-size: 11px; white-space: nowrap; }
  .copy-btn { padding: 8px 10px; }
  .messages { padding: 12px; }
  .msg { max-width: 85%; }
  .input-area {
    padding: 10px 12px; gap: 8px;
    padding-bottom: calc(10px + env(safe-area-inset-bottom));
  }
  .input-area input { font-size: 16px; padding: 12px 14px; }
  .send-btn { padding: 12px 16px; }
  .name-card { margin: 0 16px; padding: 24px; }
}

.name-modal {
  position: fixed; inset: 0; background: rgba(0,0,0,.35); display: flex;
  align-items: center; justify-content: center; z-index: 100;
}
.name-card {
  background: var(--white); border: 2.5px solid var(--ink); border-radius: 24px;
  box-shadow: 5px 6px 0 var(--ink); padding: 32px; width: 100%; max-width: 360px;
}
.name-card h2 { font-size: 24px; font-weight: 900; margin-bottom: 6px; }
.name-card p { color: var(--muted); font-size: 13px; font-weight: 600; margin-bottom: 20px; }
.name-card input {
  width: 100%; padding: 12px 16px; border: 2.5px solid var(--ink); border-radius: 12px;
  font-family: var(--font); font-size: 16px; font-weight: 700; background: var(--bg);
  outline: none; margin-bottom: 12px;
}
.name-card .btn {
  width: 100%; padding: 13px; background: var(--accent); border: 2.5px solid var(--ink);
  border-radius: 12px; font-family: var(--font); font-size: 16px; font-weight: 900;
  cursor: pointer; box-shadow: 3px 3px 0 var(--ink);
}

@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.msg { animation: fadeIn .2s ease both; }
</style>
<meta property="og:image" content="https://hrz.lol/og/chat.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://hrz.lol/og/chat.png">
</head>
<body>

<div class="name-modal" id="nameModal">
  <div class="name-card">
    <h2>pick a name</h2>
    <p>leave blank to join as anon</p>
    <input id="nameInput" placeholder="your name" maxlength="20" autofocus>
    <button class="btn" id="nameBtn">join chat</button>
  </div>
</div>

<div class="topbar">
  <div class="topbar-logo">hrz<span>.lol</span></div>
  <div class="room-code" id="roomCodeDisplay"></div>
  <button class="copy-btn" id="copyLink">copy link</button>
  <div class="user-count" id="userCount">1 online</div>
</div>

<div class="messages" id="messages"></div>

<div class="input-area">
  <input id="msgInput" placeholder="type a message..." maxlength="1000" disabled>
  <button class="send-btn" id="sendBtn" disabled>send</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const roomId = location.pathname.split('/').pop();
document.getElementById('roomCodeDisplay').textContent = roomId;
document.getElementById('copyLink').onclick = () => {
  navigator.clipboard.writeText(location.href);
  document.getElementById('copyLink').textContent = 'copied!';
  setTimeout(() => document.getElementById('copyLink').textContent = 'copy link', 2000);
};

let myName = '', myColor = '';
const socket = io('/chat');
const msgs   = document.getElementById('messages');

function addMsg(msg) {
  const isOwn    = msg.type === 'user' && msg.name === myName && msg.color === myColor;
  const isSystem = msg.type === 'system';
  const div      = document.createElement('div');
  div.className  = 'msg ' + (isSystem ? 'system' : isOwn ? 'own' : 'other');

  if (msg.type === 'user') {
    if (!isOwn) {
      const name = document.createElement('div');
      name.className = 'msg-name';
      name.style.color = msg.color;
      name.textContent = msg.name;
      div.appendChild(name);
    }
  }
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  if (!isOwn && msg.type === 'user') bubble.style.borderLeftColor = msg.color;
  bubble.textContent = msg.text;
  div.appendChild(bubble);
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

socket.on('connect', () => {});
socket.on('error', (e) => {
  if (e === 'room not found') location.href = '/chat';
});

socket.on('history', (history) => {
  history.forEach(addMsg);
});

socket.on('message', addMsg);

socket.on('users', (users) => {
  document.getElementById('userCount').textContent = users.length + ' online';
});

socket.on('self', (info) => {
  myName  = info.name;
  myColor = info.color;
  document.getElementById('msgInput').disabled  = false;
  document.getElementById('sendBtn').disabled   = false;
  document.getElementById('msgInput').focus();
});

function doJoin(name) {
  document.getElementById('nameModal').style.display = 'none';
  socket.emit('join', { roomId, name: name || 'anon' });
}

document.getElementById('nameBtn').onclick = () => {
  doJoin(document.getElementById('nameInput').value.trim());
};
document.getElementById('nameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('nameBtn').click();
});

function send() {
  const text = document.getElementById('msgInput').value.trim();
  if (!text) return;
  socket.emit('message', text);
  document.getElementById('msgInput').value = '';
}
document.getElementById('sendBtn').onclick = send;
document.getElementById('msgInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', () => {
    msgs.scrollTop = msgs.scrollHeight;
  });
}
</script>
</body>
</html>
