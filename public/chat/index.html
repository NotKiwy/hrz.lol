<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anonymous Chat Rooms – hrz.lol</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #faf8f3; --white: #fff; --ink: #111; --muted: #777770;
  --subtle: #c4c2ba; --surface: #f3f0e8; --accent: #f0c040; --font: 'Nunito', sans-serif;
}
a { -webkit-tap-highlight-color: transparent; }
a:focus { outline: none; }
body { background: var(--bg); color: var(--ink); font-family: var(--font); min-height: 100vh;
  display: flex; align-items: center; justify-content: center; padding: 20px; }
.card { background: var(--white); border: 2.5px solid var(--ink); border-radius: 24px;
  box-shadow: 5px 6px 0 var(--ink); padding: 40px; width: 100%; max-width: 420px; }
@media (max-width: 480px) {
  body { padding: 16px; align-items: flex-start; padding-top: 48px; }
  .card { padding: 28px 22px; border-radius: 18px; box-shadow: 3px 4px 0 var(--ink); }
  input { font-size: 16px; }
}
h1 { font-size: 32px; font-weight: 900; letter-spacing: -0.04em; margin-bottom: 6px; }
p { color: var(--muted); font-size: 14px; font-weight: 600; margin-bottom: 28px; line-height: 1.5; }
.btn { display: block; width: 100%; padding: 14px; background: var(--accent);
  border: 2.5px solid var(--ink); border-radius: 14px; font-family: var(--font);
  font-size: 16px; font-weight: 900; cursor: pointer; box-shadow: 3px 4px 0 var(--ink);
  transition: transform .15s, box-shadow .15s; }
.btn:hover { transform: translateY(-2px); box-shadow: 4px 6px 0 var(--ink); }
.btn:active { transform: scale(.97); box-shadow: 1px 2px 0 var(--ink); }
.divider { display: flex; align-items: center; gap: 10px; margin: 20px 0; color: var(--subtle);
  font-size: 12px; font-weight: 700; }
.divider::before, .divider::after { content: ''; flex: 1; height: 2px; background: var(--surface); }
.input-wrap { display: flex; gap: 10px; }
input { flex: 1; padding: 12px 16px; border: 2.5px solid var(--ink); border-radius: 12px;
  font-family: var(--font); font-size: 15px; font-weight: 700; background: var(--bg);
  outline: none; transition: box-shadow .15s; }
input:focus { box-shadow: 3px 3px 0 var(--ink); }
.btn-sm { padding: 12px 18px; background: var(--white); white-space: nowrap; width: auto; }
.error { color: #e74c3c; font-size: 13px; font-weight: 700; margin-top: 10px; display: none; }
</style>
<meta name="description" content="Create anonymous chat rooms with a shareable link. No account, no tracking. Your conversation disappears when you leave.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://chat.hrz.lol/">
<meta property="og:title" content="Anonymous Chat Rooms – hrz.lol">
<meta property="og:description" content="Create anonymous chat rooms with a shareable link. No account, no tracking. Your conversation disappears when you leave.">
<meta name="twitter:title" content="Anonymous Chat Rooms – hrz.lol">
<meta name="twitter:description" content="Create anonymous chat rooms with a shareable link. No account, no tracking. Your conversation disappears when you leave.">
<meta property="og:image" content="https://hrz.lol/og/chat.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://hrz.lol/og/chat.png">
</head>
<body>
<div class="card">
  <h1>chat</h1>
  <p>create a room or join an existing one. rooms disappear when everyone leaves.</p>
  <button class="btn" id="createBtn">create room</button>
  <div class="divider">or join existing</div>
  <div class="input-wrap">
    <input id="codeInput" placeholder="room code" maxlength="6">
    <button class="btn btn-sm" id="joinBtn">join</button>
  </div>
  <div class="error" id="err">room not found</div>
</div>
<script>
document.getElementById('createBtn').onclick = async () => {
  const r = await fetch('/api/chat', { method: 'POST' });
  const { id } = await r.json();
  location.href = '/chat/' + id;
};
document.getElementById('joinBtn').onclick = () => {
  const code = document.getElementById('codeInput').value.trim();
  if (!code) return;
  location.href = '/chat/' + code;
};
document.getElementById('codeInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('joinBtn').click();
});
</script>
<script src="/footer.js?v=3" defer></script>
</body>
</html>
